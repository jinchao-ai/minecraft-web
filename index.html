<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Web 平衡版</title>
  <style>
    :root {
      --ink: #f6efd8;
      --shadow: rgba(16, 9, 4, 0.58);
      --panel: rgba(31, 24, 15, 0.72);
      --panel-strong: rgba(18, 14, 9, 0.88);
      --gold: #f3c35c;
      --green: #7ec850;
      --red: #d96854;
      --blue: #6ab8ff;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0f1b24;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      user-select: none;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 25% 18%, rgba(255, 220, 122, 0.18), transparent 28%),
        radial-gradient(circle at 78% 8%, rgba(101, 180, 255, 0.14), transparent 31%),
        linear-gradient(120deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 9px);
      mix-blend-mode: screen;
      z-index: 3;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      text-shadow: 0 2px 0 #23170d, 0 0 12px rgba(0,0,0,0.45);
    }

    .topbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .card {
      pointer-events: auto;
      background: var(--panel);
      border: 2px solid rgba(255, 233, 174, 0.32);
      box-shadow: 0 10px 32px var(--shadow), inset 0 0 0 2px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
      border-radius: 0;
      padding: 10px 12px;
    }

    .brand {
      min-width: 250px;
      transform: skewX(-3deg);
    }

    .brand h1 {
      margin: 0 0 5px;
      color: var(--gold);
      font-size: 24px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand p, .help p {
      margin: 3px 0;
      font-size: 13px;
      line-height: 1.25;
    }

    .stats {
      min-width: 244px;
    }

    .meter {
      display: grid;
      grid-template-columns: 56px 1fr 34px;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
      font-size: 13px;
    }

    .bar {
      height: 13px;
      border: 2px solid rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.35);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.55);
    }

    .fill { height: 100%; transition: width 0.2s ease; }
    #health .fill { background: linear-gradient(90deg, #8e1f18, var(--red)); }
    #hunger .fill { background: linear-gradient(90deg, #b96b21, #f0a33b); }
    #stamina .fill { background: linear-gradient(90deg, #267ba8, var(--blue)); }

    .inventory {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      padding: 10px;
      pointer-events: auto;
    }

    .slot {
      width: 60px;
      height: 60px;
      position: relative;
      border: 3px solid rgba(255, 238, 194, 0.28);
      background: rgba(23, 16, 10, 0.78);
      box-shadow: inset 0 -10px 0 rgba(0,0,0,0.24), 0 6px 18px rgba(0,0,0,0.28);
      display: grid;
      place-items: center;
      font-size: 28px;
    }

    .slot.active {
      border-color: var(--gold);
      transform: translateY(-5px);
      box-shadow: 0 0 0 3px rgba(243,195,92,0.2), 0 10px 25px rgba(0,0,0,0.38);
    }

    .count {
      position: absolute;
      right: 5px;
      bottom: 3px;
      font: 700 16px Verdana, sans-serif;
      color: white;
    }

    .key {
      position: absolute;
      left: 4px;
      top: 2px;
      font: 700 10px Verdana, sans-serif;
      color: rgba(255,255,255,0.72);
    }

    .help {
      position: absolute;
      right: 14px;
      bottom: 96px;
      max-width: 286px;
      pointer-events: auto;
    }

    .message {
      position: absolute;
      left: 50%;
      top: 86px;
      transform: translateX(-50%);
      padding: 9px 16px;
      background: rgba(0,0,0,0.58);
      border: 2px solid rgba(255,255,255,0.16);
      opacity: 0;
      transition: opacity 0.2s ease;
      font-size: 15px;
      text-align: center;
    }

    .message.show { opacity: 1; }

    .crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
    }

    .crosshair::before, .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 0 4px #000;
    }

    .crosshair::before { left: 10px; top: 0; width: 2px; height: 22px; }
    .crosshair::after { top: 10px; left: 0; width: 22px; height: 2px; }

    .touch-controls {
      position: absolute;
      inset: auto 0 0 0;
      display: none;
      justify-content: space-between;
      padding: 18px;
      pointer-events: none;
    }

    .pad, .actions { pointer-events: auto; }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 5px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 62px);
      gap: 8px;
      align-content: end;
    }

    button {
      color: var(--ink);
      background: var(--panel-strong);
      border: 2px solid rgba(255, 233, 174, 0.35);
      box-shadow: 0 5px 0 rgba(0,0,0,0.28);
      font: 700 13px Georgia, serif;
    }

    button:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.28); }
    .blank { visibility: hidden; }

    @media (max-width: 820px), (pointer: coarse) {
      .touch-controls { display: flex; }
      .help { display: none; }
      .brand { min-width: 0; max-width: 52vw; }
      .brand h1 { font-size: 17px; }
      .brand p { font-size: 11px; }
      .stats { min-width: 178px; }
      .meter { grid-template-columns: 38px 1fr 26px; font-size: 11px; }
      .inventory { bottom: 128px; gap: 5px; flex-wrap: wrap; max-width: 400px; justify-content: center; }
      .inventory .slot:nth-child(n+7) { margin-top: 2px; }
      .slot { width: 52px; height: 52px; font-size: 24px; border-width: 2px; } @media(max-width:500px){ .inventory { max-width: 320px; } }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Minecraft Web sandbox game"></canvas>
  <div class="hud">
    <div class="topbar">
      <section class="card brand">
        <h1>Minecraft Web</h1>
        <p>平衡版：采集、建造、生存、昼夜循环。</p>
        <p id="worldInfo">正在生成世界...</p>
      </section>
      <section class="card stats">
        <div class="meter" id="health"><span>生命</span><div class="bar"><div class="fill"></div></div><b>100</b></div>
        <div class="meter" id="hunger"><span>饥饿</span><div class="bar"><div class="fill"></div></div><b>100</b></div>
        <div class="meter" id="stamina"><span>体力</span><div class="bar"><div class="fill"></div></div><b>100</b></div>
      </section>
    </div>
    <div class="message" id="message"></div>
    <div class="crosshair"></div>
    <section class="card inventory" id="inventory"></section>
    <section class="card help">
      <p><b>操作</b> WASD移动，空格跳跃，Shift疾跑。左键挖掘，右键攻击怪物/Boss/放置方块。</p>
      <p>1-9/0/-选择快捷栏，E木板，Q工作台，T工作台合成，F吃苹果。</p>
      <p><b>合成</b> 原木→木板(E)→木板→工作台(Q)→木棍/木镐/火把(T)</p>
    </section>
    <div class="touch-controls">
      <div class="pad">
        <button class="blank"></button><button data-key="KeyW">↑</button><button class="blank"></button>
        <button data-key="KeyA">←</button><button data-key="Space">跳</button><button data-key="KeyD">→</button>
        <button class="blank"></button><button data-key="ShiftLeft">跑</button><button class="blank"></button>
      </div>
      <div class="actions">
        <button id="touchMine">挖掘</button><button id="touchPlace">放置</button>
        <button data-key="KeyE">合成</button><button data-key="KeyF">进食</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const TILE = 32;
    const WORLD_W = 190;
    const WORLD_H = 72;
    const SAVE_KEY = 'balanced-minecraft-web-save-v1';

    const BLOCKS = {
      air: { emoji: '', color: 'transparent', solid: false, hardness: 0, name: '空气' },
      grass: { emoji: '🌿', color: '#5c9f38', solid: true, hardness: 1, name: '草方块' },
      dirt: { emoji: '🟫', color: '#8a5a32', solid: true, hardness: 1, name: '泥土' },
      stone: { emoji: '⬛', color: '#787b78', solid: true, hardness: 2.4, name: '石头' },
      maze_brick: { emoji: '🧱', color: '#8a6a52', solid: true, hardness: 99, name: '迷宫砖' },
      coal: { emoji: '◼', color: '#3c3d3d', solid: true, hardness: 3, name: '煤矿' },
      iron: { emoji: '▣', color: '#a98062', solid: true, hardness: 3.4, name: '铁矿' },
      copper: { emoji: '🔶', color: '#c87533', solid: true, hardness: 3.6, name: '铜矿' },
      gold: { emoji: '⭐', color: '#fdd835', solid: true, hardness: 3.8, name: '金矿' },
      diamond: { emoji: '💎', color: '#00e5ff', solid: true, hardness: 4.5, name: '钻石' },
      emerald: { emoji: '💚', color: '#00c853', solid: true, hardness: 4.5, name: '绿宝石' },
      lava: { emoji: '🔥', color: '#ff4500', solid: true, hardness: 4, name: '岩浆' },
      treasure: { emoji: '📦', color: '#ffd700', solid: false, hardness: 0, name: '宝箱' },
      wood: { emoji: '🪵', color: '#8f5b2c', solid: true, hardness: 1.7, name: '原木' },
      leaves: { emoji: '🍃', color: '#3f8737', solid: true, hardness: 0.7, name: '树叶' },
      sand: { emoji: '🟨', color: '#d6bb6a', solid: true, hardness: 0.8, name: '沙子' },
      water: { emoji: '💧', color: 'rgba(64, 145, 214, 0.62)', solid: false, hardness: 0, name: '水' },
      poison_gas: { emoji: '☠️', color: 'rgba(128, 0, 128, 0.65)', solid: false, hardness: 0, name: '毒气' },
      fire: { emoji: '🔥', color: '#ff6a00', solid: false, hardness: 0, name: '火焰' },
      coal: { emoji: '◼', color: '#3c3d3d', solid: true, hardness: 3, name: '煤矿' },
      iron: { emoji: '▣', color: '#a98062', solid: true, hardness: 3.4, name: '铁矿' },
      plank: { emoji: '▤', color: '#b77a38', solid: true, hardness: 1.2, name: '木板' },
      stick: { emoji: '╋', color: '#8f5b2c', solid: false, hardness: 0, name: '木棍' },
      wood_pickaxe: { emoji: '⛏️', color: '#a07840', solid: false, hardness: 0, name: '木镐' },
      workbench: { emoji: '🟫', color: '#a07840', solid: true, hardness: 1.5, name: '工作台' },
      torch: { emoji: '🔥', color: '#f39b2e', solid: false, hardness: 0.2, name: '火把', light: 1 },
      apple: { emoji: '🍎', color: '#d84f37', solid: false, hardness: 0, name: '苹果' },
      bat_meat: { emoji: '🥩', color: '#c44', solid: false, hardness: 0, name: '生肉' },
      cooked_meat: { emoji: '🍖', color: '#a0522d', solid: false, hardness: 0, name: '熟肉', heals: 8 },
      bed: { emoji: '🛏️', color: '#7a4f9e', solid: true, hardness: 1, name: '床' },
      furnace: { emoji: '🧱', color: '#555', solid: true, hardness: 2.5, name: '熔炉' }
    };

    const HOTBAR = ['grass','dirt','stone','wood','coal','iron','copper','gold','diamond','emerald','sand','leaves','plank','stick','torch','workbench','wood_pickaxe','apple','bat_meat','cooked_meat','bed','furnace'];
    const inventory = { grass: 4, dirt: 8, stone: 4, wood: 0, leaves: 0, sand: 0, coal: 0, iron: 0, copper: 0, gold: 0, diamond: 0, emerald: 0, plank: 0, stick: 0, torch: 5, workbench: 0, wood_pickaxe: 0, apple: 32, bat_meat: 0, cooked_meat: 0, bed: 0, furnace: 0 };
    let selected = 0;
    let world = [];
    let particles = [];
    let clouds = [];
    let keys = new Set();
    let mouse = { x: 0, y: 0, down: false, right: false };
    let camera = { x: 0, y: 0 };
    let spawn = { x: 10 * TILE, y: 8 * TILE };
    let time = 0.18;
    let last = performance.now();
    let mineProgress = 0;
    let miningCooldown = 0;
    let mineTarget = null;
    let messageTimer = 0;
    let waterTickAccum = 0;
    let poisonTickAccum = 0;
    let mobs = [];
    let mobSpawnAccum = 0;
    let mobDmgAccum = 0;
    let boss = null;
    let bossWaking = false;
    let bossFireballs = [];
    let fireParticles = [];
    let bossSpawnAccum = 0;
    let bees = [];
    let beeStingers = [];
    let beeSpawnAccum = 0;

    const player = {
      x: spawn.x, y: spawn.y, w: 21, h: 29, vx: 0, vy: 0,
      facing: 1, grounded: false, health: 100, hunger: 100, stamina: 100,
      walkCycle: 0, armSwing: 0, breathCycle: 0,
      batKillCount: 0, sleepTimer: 0, nearFurnace: false
    };

    function noise(n) {
      const x = Math.sin(n * 127.1 + 311.7) * 43758.5453;
      return x - Math.floor(x);
    }

    function smoothNoise(x) {
      const i = Math.floor(x);
      const f = x - i;
      const a = noise(i);
      const b = noise(i + 1);
      const t = f * f * (3 - 2 * f);
      return a + (b - a) * t;
    }

    function generateWorld(fresh = false) {
      world = Array.from({ length: WORLD_H }, () => Array(WORLD_W).fill('air'));
      for (let x = 0; x < WORLD_W; x++) {
        const hill = smoothNoise(x * 0.045) * 9 + smoothNoise(x * 0.12) * 4;
        const surface = Math.floor(28 + hill);
        for (let y = surface; y < WORLD_H; y++) {
          let block = 'stone';
          if (y === surface) block = x % 37 < 5 ? 'sand' : 'grass';
          else if (y < surface + 5) block = x % 37 < 5 ? 'sand' : 'dirt';
          // 深层矿石分布
          if (y > surface + 9) {
            if (noise(x * 3.1 + y * 8.8) > 0.91) block = 'coal';
            if (y > surface + 18 && noise(x * 5.7 + y * 2.3) > 0.945) block = 'iron';
            if (y > surface + 26 && noise(x * 7.3 + y * 3.7) > 0.958) block = 'copper';
            if (y > surface + 33 && noise(x * 9.1 + y * 4.2) > 0.965) block = 'gold';
            if (y > surface + 40 && noise(x * 11.2 + y * 5.1) > 0.972) block = 'diamond';
            if (y > surface + 36 && noise(x * 8.4 + y * 6.3) > 0.97) block = 'emerald';
            if (y > surface + 45 && noise(x * 6.8 + y * 9.9) > 0.978) block = 'lava';
          }
          world[y][x] = block;
        }
        if (x % 14 === 4 && x > 8 && x < WORLD_W - 8 && world[surface][x] === 'grass') {
          plantTree(x, surface - 1);
        }
        if (x % 37 < 5) {
          for (let y = surface - 1; y < Math.min(surface + 2, WORLD_H); y++) world[y][x] = 'water';
        }
      }
      // 矿洞生成（地下深层y>45，随机挖空形成洞穴）
      generateCaves();
      // 地下迷宫（深层y=38~52层）
      generateMaze(38, 52);
      spawn = { x: 9 * TILE, y: 20 * TILE };
      // 随机出生点（地图随机位置）
      const baseX = Math.floor(20 + Math.random() * (WORLD_W - 50));
      const surfaceY = world.findIndex((row) => row[baseX] !== 'air');
      if (surfaceY > 0) spawn = { x: baseX * TILE, y: (surfaceY - 2) * TILE };
      if (fresh) {
        // 随机初始物品
        inventory.grass = Math.floor(Math.random() * 6) + 4;
        inventory.dirt = Math.floor(Math.random() * 10) + 6;
        inventory.stone = Math.floor(Math.random() * 6) + 2;
        inventory.wood = Math.floor(Math.random() * 2);
        inventory.leaves = 0;
        inventory.sand = Math.floor(Math.random() * 4);
        inventory.plank = Math.floor(Math.random() * 2);
        inventory.stick = 0;
        inventory.wood_pickaxe = 0;
        inventory.workbench = 0;
        inventory.torch = Math.floor(Math.random() * 4) + 3;
        inventory.apple = Math.floor(Math.random() * 32) + 64;
      }
      resetPlayer(false);
      clouds = Array.from({ length: 12 }, (_, i) => ({ x: i * 520 + noise(i) * 180, y: 50 + noise(i + 8) * 90, s: 0.8 + noise(i + 20) * 0.8 }));

      // ══════════════════════════════════════
      //  地下洞穴生成
      // ══════════════════════════════════════
      function generateCaves() {
        for (let i = 0; i < 30; i++) {
          const cx = Math.floor(5 + Math.random() * (WORLD_W - 10));
          const cy = Math.floor(42 + Math.random() * 25);
          const size = Math.floor(4 + Math.random() * 6);
          for (let dx = -size; dx <= size; dx++) {
            for (let dy = -size; dy <= size; dy++) {
              if (dx * dx + dy * dy <= size * size) {
                const nx = cx + dx, ny = cy + dy;
                if (nx > 0 && nx < WORLD_W - 1 && ny > 35 && ny < WORLD_H - 1) {
                  const b = world[ny][nx];
                  if (b !== 'air' && b !== 'water' && b !== 'lava' && b !== 'treasure' && b !== 'maze_brick') world[ny][nx] = 'air';
                }
              }
            }
          }
          // 洞穴连接通道
          const steps = Math.floor(10 + Math.random() * 15);
          let cx2 = cx, cy2 = cy;
          for (let s = 0; s < steps; s++) {
            cx2 += Math.floor(Math.random() * 3) - 1;
            cy2 += Math.floor(Math.random() * 3) - 1;
            if (cx2 > 1 && cx2 < WORLD_W - 1 && cy2 > 35 && cy2 < WORLD_H - 1) {
              if (world[cy2][cx2] !== 'lava' && world[cy2][cx2] !== 'treasure' && world[cy2][cx2] !== 'maze_brick') world[cy2][cx2] = 'air';
              // 通道宽一些
              for (let w = -1; w <= 1; w++) {
                if (world[cy2 + w] && world[cy2 + w][cx2] !== 'lava' && world[cy2 + w][cx2] !== 'treasure' && world[cy2 + w][cx2] !== 'maze_brick') world[cy2 + w][cx2] = 'air';
              }
            }
          }
        }
      }

      // ══════════════════════════════════════
      //  地下迷宫生成（给定Y轴范围）
      // ══════════════════════════════════════
      function generateMaze(startY, endY) {
        const cellSize = 7; // 每格单元大小
        for (let section = 0; section < 3; section++) {
          const offsetX = Math.floor(3 + section * (WORLD_W / 3));
          const mazeW = Math.floor(Math.min((WORLD_W - 6) / 3, 35));
          const mazeH = Math.floor(Math.min(endY - startY, 12));
          const grid = Array.from({ length: mazeH }, () => Array(mazeW).fill(1));
          // 递归回溯生成迷宫
          function carve(cx, cy) {
            grid[cy][cx] = 0;
            const dirs = [[0,-2],[2,0],[0,2],[-2,0]];
            for (let i = dirs.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
            }
            for (const [dx, dy] of dirs) {
              const nx = cx + dx, ny = cy + dy;
              if (nx > 0 && nx < mazeW - 1 && ny > 0 && ny < mazeH - 1 && grid[ny][nx] === 1) {
                grid[cy + dy / 2][cx + dx / 2] = 0;
                carve(nx, ny);
              }
            }
          }
          carve(1, 1);
          // 转换为世界坐标
          for (let gy = 0; gy < mazeH; gy++) {
            for (let gx = 0; gx < mazeW; gx++) {
              const wx = offsetX + gx * cellSize;
              const wy = startY + gy;
              if (gy < grid.length && gx < grid[0].length) {
                if (grid[gy][gx] === 0) {
                  // 通路：挖空
                  for (let ddx = 0; ddx < cellSize; ddx++) {
                    for (let ddy = 0; ddy < cellSize; ddy++) {
                      const bx = wx + ddx, by = wy + ddy;
                      if (bx > 0 && bx < WORLD_W - 1 && by > 0 && by < WORLD_H - 1) {
                        if (world[by][bx] !== 'lava' && world[by][bx] !== 'treasure' && world[by][bx] !== 'maze_brick') world[by][bx] = 'air';
                      }
                    }
                  }
                }
              }
            }
          }
          // 迷宫内随机放宝箱（每个迷宫的终点区域）
          const treasureSpots = [];
          for (let gy = mazeH - 3; gy < mazeH; gy++) {
            for (let gx = mazeW - 3; gx < mazeW; gx++) {
              if (gy > 0 && gy < mazeH - 1 && gx > 0 && gx < mazeW - 1 && grid[gy] && grid[gy][gx] === 0) {
                treasureSpots.push({ gx, gy });
              }
            }
          }
          if (treasureSpots.length > 0) {
            const spot = treasureSpots[Math.floor(Math.random() * treasureSpots.length)];
            const tx = offsetX + spot.gx * cellSize + Math.floor(cellSize / 2);
            const ty = startY + spot.gy + 1;
            if (ty > 0 && ty < WORLD_H - 1 && tx > 0 && tx < WORLD_W - 1) {
              if (world[ty][tx] === 'air') world[ty][tx] = 'treasure';
            }
          }
        }
      }

      // ══════════════════════════════════════
      //  宝箱奖励
      // ══════════════════════════════════════
      function findNearestTreasure() {
        let best = { dist: Infinity, dx: 0, dy: 0 };
        const px = Math.floor(player.x / TILE), py = Math.floor(player.y / TILE);
        for (let y = 0; y < WORLD_H; y++) {
          for (let x = 0; x < WORLD_W; x++) {
            if (world[y][x] === 'treasure') {
              const d = Math.sqrt((x - px) ** 2 + (y - py) ** 2);
              if (d < best.dist) best = { dist: d, dx: x - px, dy: y - py };
            }
          }
        }
        return best;
      }
      function compassArrow(angle) {
        // 0=东 90=南 180=西 270=北
        if (angle > -22 && angle <= 22) return '→东';
        if (angle > 22 && angle <= 67) return '↘东南';
        if (angle > 67 && angle <= 112) return '↓南';
        if (angle > 112 && angle <= 157) return '↙西南';
        if (angle > 157 || angle <= -157) return '←西';
        if (angle > -157 && angle <= -112) return '↙西南';
        if (angle > -112 && angle <= -67) return '↑北';
        if (angle > -67 && angle <= -22) return '↗东北';
        return '?';
      }

      function openTreasure() {
        if (getBlock(Math.floor(player.x / TILE), Math.floor(player.y / TILE) - 1) === 'treasure') {
          const roll = Math.random();
          let reward = '';
          if (roll < 0.3) { reward = '铁锭+3'; inventory.iron = (inventory.iron || 0) + 3; }
          else if (roll < 0.55) { reward = '钻石+1'; inventory.diamond = (inventory.diamond || 0) + 1; }
          else if (roll < 0.75) { reward = '金锭+2'; inventory.gold = (inventory.gold || 0) + 2; }
          else if (roll < 0.9) { reward = '绿宝石+1'; inventory.emerald = (inventory.emerald || 0) + 1; }
          else { reward = '苹果+5'; inventory.apple = (inventory.apple || 0) + 5; }
          setBlock(Math.floor(player.x / TILE), Math.floor(player.y / TILE) - 1, 'air');
          showMessage('📦 获得：' + reward + '！');
        }
      }

            showMessage(fresh ? '🌍 新世界已生成，随机出生点！' : '世界已重置。');
    }

    function plantTree(x, y) {
      for (let i = 0; i < 5; i++) setBlock(x, y - i, 'wood');
      for (let yy = y - 6; yy <= y - 3; yy++) {
        for (let xx = x - 2; xx <= x + 2; xx++) {
          if (Math.abs(xx - x) + Math.abs(yy - (y - 4)) < 4 && getBlock(xx, yy) === 'air') setBlock(xx, yy, 'leaves');
        }
      }
    }

    function getBlock(x, y) {
      if (x < 0 || y < 0 || x >= WORLD_W || y >= WORLD_H) return 'stone';
      return world[y][x];
    }

    function setBlock(x, y, type) {
      if (x < 0 || y < 0 || x >= WORLD_W || y >= WORLD_H) return;
      world[y][x] = type;
    }

    function mineBlock(tx, ty, dt) {
      const type = getBlock(tx, ty);
      if (type === 'air' || type === 'water') return false;
      const same = mineTarget && mineTarget.x === tx && mineTarget.y === ty;
      if (!same) { mineTarget = { x: tx, y: ty }; mineProgress = 0; }
      const block = BLOCKS[type];
      const toolBonus = inventory.wood_pickaxe > 0 && ['stone','coal','iron','copper','gold'].includes(type) ? 1.4 : 1;
      mineProgress += 1; // 单击一次=1次命中
      player.stamina = Math.max(0, player.stamina - 1.5);
      if (mineProgress >= block.hardness) {
        setBlock(tx, ty, 'air');
        inventory[type] = (inventory[type] || 0) + 1;
        if (type === 'leaves' && Math.random() < 0.34) inventory.apple++;
        burst(tx * TILE + TILE / 2, ty * TILE + TILE / 2, block.color);
        let msg = '⛏️ 获得 ' + block.name + '!';
        if (['coal','iron','copper','gold','diamond','emerald'].includes(type)) {
          msg = '⛏️ ' + block.name + '!';
        }
        showMessage(msg);
        mineProgress = 0;
        mineTarget = null;
        return true;
      }
      return false;
    }

    function placeBlock(tx, ty) {
      const type = HOTBAR[selected];
      if (type === 'apple') return eatApple();
      if ((inventory[type] || 0) <= 0 || getBlock(tx, ty) !== 'air') return false;
      const px = player.x + player.w / 2;
      const py = player.y + player.h / 2;
      if (Math.abs(tx * TILE + TILE / 2 - px) > TILE * 5 || Math.abs(ty * TILE + TILE / 2 - py) > TILE * 4) return false;
      const rect = { x: tx * TILE, y: ty * TILE, w: TILE, h: TILE };
      if (overlaps(player, rect)) return false;
      setBlock(tx, ty, type);
      inventory[type]--;
      showMessage(`放置 ${BLOCKS[type].name}`);
      return true;
    }

    // 工作台放置（右键点击放置模式+手持工作台）
    function placeWorkbench() {
      const t = targetFromPointer();
      const type = HOTBAR[selected];
      if (getBlock(t.x, t.y) !== 'air') return false;
      if (type === 'workbench') {
        if (inventory.workbench <= 0) return false;
        inventory.workbench--;
        setBlock(t.x, t.y, 'workbench');
        showMessage('放置工作台！站在附近按 E 使用。');
        return true;
      }
      if (type === 'bed') {
        if (inventory.bed <= 0) return false;
        inventory.bed--;
        setBlock(t.x, t.y, 'bed');
        showMessage('放置床！按 B 睡觉跳过夜晚（需在床上方站立）。');
        return true;
      }
      if (type === 'furnace') {
        if (inventory.furnace <= 0) return false;
        inventory.furnace--;
        setBlock(t.x, t.y, 'furnace');
        showMessage('放置熔炉！站在2格内按 R 烤肉（需生肉+燃料）。');
        return true;
      }
      if (type !== 'workbench') return false;
    }

    // 合成系统 - 全部需要工作台
    function getNearbyWorkbench() {
      const px = Math.floor(player.x / TILE);
      const py = Math.floor(player.y / TILE);
      for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          if (getBlock(px + dx, py + dy) === 'workbench') return true;
        }
      }
      return false;
    }
    function getNearbyFurnace() {
      const px = Math.floor(player.x / TILE);
      const py = Math.floor(player.y / TILE);
      for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          if (getBlock(px + dx, py + dy) === 'furnace') return true;
        }
      }
      return false;
    }

    // 合成工作台（不需要工作台就能合成）
    function craftWorkbench() {
      if (inventory.plank < 4) {
        showMessage('需要4个木板才能合成工作台（当前：' + inventory.plank + '个）');
        return false;
      }
      inventory.plank -= 4;
      inventory.workbench++;
      showMessage('合成工作台！右键放置到地上再使用。');
      return true;
    }

    // 工作台高级合成（必须在工作台2格内）
    function craftAtWorkbench() {
      if (!getNearbyWorkbench()) {
        showMessage('附近没有工作台（站在工作台2格内）');
        return false;
      }
      // 合成木棍：2木板 → 4木棍
      if (inventory.plank >= 2) {
        inventory.plank -= 2;
        inventory.stick += 4;
        showMessage('工作台：2木板 → 4木棍 ✓');
        return true;
      }
      // 合成木镐：3木板 + 2木棍
      if (inventory.plank >= 3 && inventory.stick >= 2) {
        inventory.plank -= 3;
        inventory.stick -= 2;
        inventory.wood_pickaxe++;
        showMessage('工作台：3木板+2木棍 → 木镐 ✓');
        return true;
      }
      // 合成火把：1煤矿+1木棍 → 4火把
      if (inventory.coal >= 1 && inventory.stick >= 1) {
        inventory.coal -= 1;
        inventory.stick -= 1;
        inventory.torch += 4;
        showMessage('工作台：1煤矿+1木棍 → 4火把 ✓');
        return true;
      }
      showMessage('工作台合成：需要木板或煤矿+木棍。');
      return false;
    }

    // 徒手合成（不需要工作台）
    function craftPlanks() {
      if (inventory.wood <= 0) {
        showMessage('需要原木才能合成木板。');
        return false;
      }
      inventory.wood--;
      inventory.plank += 4;
      showMessage('1 原木 → 4 木板（徒手合成）');
      return true;
    }

    function trySleep() {
      const pbx = Math.floor(player.x / TILE), pby = Math.floor(player.y / TILE);
      for (let dy = -1; dy <= 0; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (getBlock(pbx + dx, pby + dy) === 'bed') {
            if (time > 0.25 && time < 0.85) {
              player.sleepTimer = (0.85 - time) * 30;
              showMessage('💤 正在睡觉...');
              return;
            } else {
              showMessage('现在是白天，不需要睡觉');
              return;
            }
          }
        }
      }
      showMessage('附近没有床（需要站在床上方1格内）');
    }
    function tryCook() {
      const px3 = Math.floor(player.x / TILE), py3 = Math.floor(player.y / TILE);
      let nearFurnace = false;
      for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          if (getBlock(px3 + dx, py3 + dy) === 'furnace') { nearFurnace = true; break; }
        }
      }
      if (!nearFurnace) { showMessage('附近没有熔炉（站在熔炉2格内）'); return; }
      if ((inventory.bat_meat || 0) <= 0) { showMessage('背包里没有生肉可烤'); return; }
      if ((inventory.coal || 0) <= 0 && (inventory.wood || 0) <= 0 && (inventory.plank || 0) <= 0) { showMessage('需要燃料（煤矿/木板）来烤肉'); return; }
      if ((inventory.coal || 0) > 0) inventory.coal--;
      else if ((inventory.plank || 0) > 0) inventory.plank--;
      else inventory.wood--;
      inventory.bat_meat--;
      inventory.cooked_meat = (inventory.cooked_meat || 0) + 1;
      showMessage('🍖 生肉烤成熟肉！+1熟肉（+8HP）');
    }

    function eatApple() {
      // 优先吃熟肉（效果最好）
      if ((inventory.cooked_meat || 0) > 0 && player.health < 100) {
        inventory.cooked_meat--;
        player.health = Math.min(100, player.health + 8);
        player.hunger = Math.min(100, player.hunger + 20);
        showMessage('🍖 熟肉 HP+8 饱腹+20');
        return;
      }
      // 其次苹果
      if ((inventory.apple || 0) > 0 && player.health < 100) {
        inventory.apple--;
        player.health = Math.min(100, player.health + 10);
        player.hunger = Math.min(100, player.hunger + 15);
        showMessage('🍎 苹果 HP+10 饱腹+15');
        return;
      }
      // 最后生肉（有中毒风险）
      if ((inventory.bat_meat || 0) > 0 && player.health < 100) {
        inventory.bat_meat--;
        player.health = Math.min(100, player.health + 3);
        player.hunger = Math.min(100, player.hunger + 8);
        if (Math.random() < 0.15) {
          player.health = Math.max(0, player.health - 3);
          showMessage('😷 生肉中毒！HP-3 但饱腹+8');
        } else {
          showMessage('🥩 生肉 HP+3 饱腹+8（烤熟更好）');
        }
        return;
      }
      showMessage('没有可吃的食物');
    }

    function saveGame() {
      localStorage.setItem(SAVE_KEY, JSON.stringify({ world, inventory, player: { x: player.x, y: player.y, health: player.health, hunger: player.hunger }, time, mobs, boss }));
      showMessage('已保存世界。');
    }

    function loadGame() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) { showMessage('没有存档。'); return false; }
      const data = JSON.parse(raw);
      world = data.world;
      Object.assign(inventory, data.inventory);
      Object.assign(player, data.player, { vx: 0, vy: 0 });
      time = data.time || 0.2;
      mobs = data.mobs || [];
      showMessage('已读取存档。');
      return true;
    }

    function resetPlayer(full = true) {
      player.x = spawn.x;
      player.y = spawn.y;
      player.vx = 0;
      player.vy = 0;
      player.health = full ? 100 : player.health;
      player.hunger = full ? 100 : player.hunger;
      player.stamina = 100;
      player.sleepTimer = 0;
      // 清空所有毒气
      if (full) {
        for (let y = 0; y < WORLD_H; y++) {
          for (let x = 0; x < WORLD_W; x++) {
            if (world[y][x] === 'poison_gas') world[y][x] = 'air';
          }
        }
      }
      showMessage('已在出生点重生 ☠️ 注意：地下深层有紫色毒气！');
    }

    function burst(x, y, color) {
      for (let i = 0; i < 12; i++) {
        particles.push({ x, y, vx: (Math.random() - 0.5) * 160, vy: (Math.random() - 0.8) * 150, life: 0.45 + Math.random() * 0.4, color });
      }
    }

    function overlaps(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function isSolidAtPixel(px, py) {
      const type = getBlock(Math.floor(px / TILE), Math.floor(py / TILE));
      return BLOCKS[type].solid;
    }

    function moveAndCollide(dt) {
      player.grounded = false;
      player.x += player.vx * dt;
      collideAxis('x');
      player.y += player.vy * dt;
      collideAxis('y');
    }

    function collideAxis(axis) {
      const left = Math.floor(player.x / TILE);
      const right = Math.floor((player.x + player.w) / TILE);
      const top = Math.floor(player.y / TILE);
      const bottom = Math.floor((player.y + player.h) / TILE);
      for (let y = top; y <= bottom; y++) {
        for (let x = left; x <= right; x++) {
          const type = getBlock(x, y);
          if (!BLOCKS[type].solid) continue;
          const b = { x: x * TILE, y: y * TILE, w: TILE, h: TILE };
          if (!overlaps(player, b)) continue;
          if (axis === 'x') {
            if (player.vx > 0) player.x = b.x - player.w;
            if (player.vx < 0) player.x = b.x + b.w;
            player.vx = 0;
          } else {
            if (player.vy > 0) { player.y = b.y - player.h; player.grounded = true; }
            if (player.vy < 0) player.y = b.y + b.h;
            player.vy = 0;
          }
        }
      }
    }

    function update(dt) {
      time = (time + dt / 240) % 1;
      // ── 30分钟自动锁定检测 ──
      if (gameState === 'playing' && !isResting) {
        const elapsed = Date.now() - parseInt(localStorage.getItem(gameStartKey) || Date.now().toString());
        if (elapsed >= LOCK_DURATION_MS) {
          const now = Date.now();
          localStorage.setItem(LOCK_KEY + '_start', now.toString());
          localStorage.setItem(LOCK_KEY + '_end', (now + 8 * 60 * 60 * 1000).toString()); // 强制休息8小时
          restStartTime = now.toString(); restEndTime = (now + 8*60*60*1000).toString();
          isResting = true; gameState = 'resting';
          showMessage('⏰ 游戏时间到！进入休息状态...');
        }
      }
      // ── 睡觉跳过时间 ──
      if (player.sleepTimer > 0) {
        player.sleepTimer -= dt;
        time = (time + dt * 0.08) % 1;
        if (time > 0.28 && time < 0.35) {
          time = 0.28; player.sleepTimer = 0;
          player.health = Math.min(100, player.health + 5);
          showMessage('☀️ 天亮了！HP +5');
        }
        return;
      }
      // ── BOSS觉醒检测 ──
      const playerDepth = Math.floor(player.y / TILE);
      if (!boss && playerDepth >= WORLD_H - 15) {
        boss = { x: player.x + (Math.random()<0.5?-1:1)*200, y: player.y + TILE,
          w:28, h:38, hp:300, maxHp:300, vx:0, vy:0,
          awake:false, awakeTimer:0, atkTimer:0, attackCooldown:0,
          invincible:0, wakeFlash:null, facing:1 };
        showMessage('⚠️ 地下深处传来沉重的脚步声...');
      }
      // ── BOSS行为 ──
      if (boss) {
        boss.invincible = Math.max(0, boss.invincible - dt);
        boss.atkTimer = Math.max(0, boss.atkTimer - dt);
        boss.attackCooldown = Math.max(0, boss.attackCooldown - dt);
        const bdx = player.x - boss.x, bdy = player.y - boss.y;
        const bdist = Math.sqrt(bdx*bdx + bdy*bdy);
        boss.facing = bdx >= 0 ? 1 : -1;
        if (!boss.awake) {
          boss.awakeTimer += dt;
          boss.wakeFlash = Math.sin(Date.now()/150)>0 ? '#f00' : '#800';
          if (boss.awakeTimer >= 3) { boss.awake = true; boss.wakeFlash = null; showMessage('👹 BOSS苏醒了！正在追来！'); }
        } else {
          const bspd = 65;
          if (bdist > 28) {
            boss.vx += (bdx/bdist) * bspd * dt * 4;
            boss.vy += (bdy/bdist) * bspd * dt * 4;
          }
          boss.vx *= 0.88; boss.vy *= 0.88;
          boss.x += boss.vx * dt; boss.y += boss.vy * dt;
          // 重力
          if (!isSolidAtPixel(boss.x+boss.w/2, boss.y+boss.h+2)) boss.y += 80*dt;
          // 左右碰撞
          if (boss.vx < -0.5 && !isSolidAtPixel(boss.x-2, boss.y+boss.h/2)) boss.x += boss.vx*dt;
          if (boss.vx >  0.5 && !isSolidAtPixel(boss.x+boss.w+2, boss.y+boss.h/2)) boss.x += boss.vx*dt;
          // 近身攻击
          if (bdist < 36 && boss.attackCooldown <= 0) {
            player.health = Math.max(0, player.health - 15);
            boss.attackCooldown = 1.2;
            spawnParticles(player.x, player.y, '#f44', 5);
            showMessage('💥 BOSS猛击！-15HP');
          }
          // 火球
          if (boss.atkTimer <= 0 && bdist > 50) {
            bossFireballs.push({ x:boss.x+boss.w/2, y:boss.y+boss.h/2, vx:(bdx/bdist)*120, vy:(bdy/bdist)*120, life:4 });
            boss.atkTimer = 3;
          }
        }
        // 火球更新
        for (let fi = bossFireballs.length-1; fi>=0; fi--) {
          const fb = bossFireballs[fi];
          fb.x += fb.vx*dt; fb.y += fb.vy*dt; fb.life -= dt;
          const fbtx=Math.floor(fb.x/TILE), fbty=Math.floor(fb.y/TILE);
          if (fb.life<=0 || getBlock(fbtx,fbty)!=='air') { spawnParticles(fb.x,fb.y,'#f80',6); bossFireballs.splice(fi,1); continue; }
          if (Math.abs(fb.x-player.x)<18 && Math.abs(fb.y-player.y)<18) {
            player.health = Math.max(0, player.health-8);
            spawnParticles(player.x, player.y, '#f80', 4);
            bossFireballs.splice(fi,1);
          }
        }
        // 死亡
        if (boss.hp <= 0) {
          spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#f00', 20);
          spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#ff0', 15);
          inventory.diamond = (inventory.diamond||0)+3;
          inventory.gold = (inventory.gold||0)+5;
          inventory.emerald = (inventory.emerald||0)+2;
          showMessage('🏆 BOSS击杀！掉落钻石x3 金锭x5 绿宝石x2！');
          boss = null;
        }
      }
      const sprinting = keys.has('ShiftLeft') && player.stamina > 3 && player.hunger > 8;
      const speed = sprinting ? 205 : 145;
      let dir = 0;
      if (keys.has('KeyA')) dir--;
      if (keys.has('KeyD')) dir++;
      player.vx += (dir * speed - player.vx) * Math.min(1, dt * 13);
      if (dir) player.facing = dir;
      if ((keys.has('KeyW') || keys.has('Space')) && player.grounded && player.stamina > 4) {
        player.vy = -405;
        player.stamina -= 5;
      }
      player.vy += 940 * dt;
      player.vy = Math.min(player.vy, 640);
      moveAndCollide(dt);
      const inWater = getBlock(Math.floor((player.x + player.w / 2) / TILE), Math.floor((player.y + player.h) / TILE)) === 'water';
      if (inWater) { player.vy -= 520 * dt; player.vx *= 0.92; }
      player.hunger = Math.max(0, player.hunger - dt * (sprinting ? 1.35 : 0.36));
      if (!sprinting && player.stamina < 100) player.stamina = Math.min(100, player.stamina + dt * 12);
      if (player.hunger <= 0) player.health = Math.max(0, player.health - dt * 3.5);
      if (player.hunger > 70 && player.health < 100) player.health = Math.min(100, player.health + dt * 1.2);
      if (player.y > WORLD_H * TILE + 200 || player.health <= 0) resetPlayer(true);
      miningCooldown = Math.max(0, miningCooldown - dt);
      if (mouse.down && miningCooldown <= 0) { mineAtPointer(dt); miningCooldown = 0.15; }
      particles = particles.filter(p => {
        p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 260 * dt; return p.life > 0;
      });
      for (const c of clouds) c.x = (c.x + dt * 10 * c.s) % (WORLD_W * TILE + 600);
      // 水流下落
      waterTickAccum += dt;
      if (waterTickAccum >= 0.25) {
        waterTickAccum = 0;
        const newWorld = world.map(r => [...r]);
        for (let y = WORLD_H - 2; y >= 0; y--) {
          for (let x = 0; x < WORLD_W; x++) {
            if (world[y][x] === 'water' && newWorld[y + 1][x] === 'air') {
              newWorld[y + 1][x] = 'water';
              newWorld[y][x] = 'air';
            }
          }
        }
        world = newWorld;
      }
      // 毒气生成与蔓延（每10秒）
      poisonTickAccum = (poisonTickAccum || 0) + dt;
      if (poisonTickAccum >= 10) {
        poisonTickAccum = 0;
        const px = Math.floor(player.x / TILE);
        const py = Math.floor(player.y / TILE);
        // 地下判定：头顶有5格以上实心方块即为深处
        let solidAbove = 0;
        for (let i = 1; i <= 10; i++) {
          if (py - i < 0) break;
          const b = world[py - i][px];
          if (b !== 'air' && b !== 'water' && b !== 'poison_gas') solidAbove++;
        }
        if (solidAbove >= 5 && py > 5) {
          const spotX = Math.max(0, Math.min(WORLD_W - 1, px + Math.floor(Math.random() * 7) - 3));
          const spotY = Math.max(0, Math.min(WORLD_H - 1, py + Math.floor(Math.random() * 3)));
          if (world[spotY][spotX] === 'air') {
            world[spotY][spotX] = 'poison_gas';
          }
        }
        // 毒气蔓延：先统计每片大小，再限制最多10块
        const clusterSeen = new Set();
        const countCluster = (sx, sy) => {
          const key = sx+','+sy;
          if (clusterSeen.has(key)) return 0;
          let count = 0;
          const queue = [[sx,sy]];
          clusterSeen.add(key);
          while (queue.length) {
            const [cx,cy] = queue.shift();
            count++;
            for (const [ddx,ddy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
              const nx=cx+ddx, ny=cy+ddy, nk=nx+','+ny;
              if (!clusterSeen.has(nk)&&nx>=0&&nx<WORLD_W&&ny>=0&&ny<WORLD_H&&world[ny][nx]==='poison_gas') {
                clusterSeen.add(nk); queue.push([nx,ny]);
              }
            }
          }
          return count;
        };
        const newWorld2 = world.map(r => [...r]);
        for (let y = 0; y < WORLD_H; y++) {
          for (let x = 0; x < WORLD_W; x++) {
            if (world[y][x] === 'poison_gas' && Math.random() < 0.35) {
              if (countCluster(x, y) >= 10) continue;
              const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
              const [dx,dy] = dirs[Math.floor(Math.random() * dirs.length)];
              const nx=x+dx, ny=y+dy;
              if (nx>=0&&nx<WORLD_W&&ny>=0&&ny<WORLD_H&&newWorld2[ny][nx]==='air') {
                newWorld2[ny][nx] = 'poison_gas';
              }
            }
          }
        }
        world = newWorld2;
        // 玩家接触毒气扣血
        const pbx = Math.floor(player.x / TILE);
        const pby = Math.floor(player.y / TILE);
        for (let dy = 0; dy <= 1; dy++) {
          for (let dx = 0; dx <= 1; dx++) {
            if (world[pby + dy] && world[pby + dy][pbx + dx] === 'poison_gas') {
              player.health = Math.max(0, player.health - 0.8);
              if (Math.random() < 0.03) showMessage('☠️ 毒气侵蚀！');
              break;
            }
          }
        }
      }
      // 怪物生成（每15秒在地下深处生成一只）
      mobSpawnAccum += dt;
      // 蝙蝠群：深处有概率成群生成
      const py2 = Math.floor(player.y / TILE);
      if (py2 > 20 && Math.random() < 0.004 && mobs.length < 12) {
        mobs.push({ x: player.x + (Math.random()-0.5)*120, y: player.y - 20, vx: 0, vy: 0, w: 16, h: 14, hp: 4, maxHp: 4, atkTimer: 0, grounded: false, attackCooldown: 0, wingAngle: Math.random()*6, wanderTimer: 0.5, wanderTarget: null, type: 'bat' });
        if (Math.random() < 0.4) mobs.push({ x: player.x + (Math.random()-0.5)*100, y: player.y - 30, vx: 0, vy: 0, w: 16, h: 14, hp: 4, maxHp: 4, atkTimer: 0, grounded: false, attackCooldown: 0, wingAngle: Math.random()*6, wanderTimer: 0.5, wanderTarget: null, type: 'bat' });
        if (Math.random() < 0.2) mobs.push({ x: player.x + (Math.random()-0.5)*80, y: player.y - 10, vx: 0, vy: 0, w: 16, h: 14, hp: 4, maxHp: 4, atkTimer: 0, grounded: false, attackCooldown: 0, wingAngle: Math.random()*6, wanderTimer: 0.5, wanderTarget: null, type: 'bat' });
      }
      // 普通怪物
      mobSpawnAccum += dt;
      if (mobSpawnAccum >= 15 && mobs.length < 8) {
        mobSpawnAccum = 0;
        const px = Math.floor(player.x / TILE);
        const py = Math.floor(player.y / TILE);
        let solidAbove = 0;
        for (let i = 1; i <= 10; i++) {
          if (py - i < 0) break;
          const b = world[py - i][px];
          if (b !== 'air' && b !== 'water' && b !== 'poison_gas') solidAbove++;
        }
        if (solidAbove >= 5) {
          const sx = Math.max(1, Math.min(WORLD_W - 2, px + Math.floor(Math.random() * 11) - 5));
          const sy = Math.max(1, Math.min(WORLD_H - 2, py + Math.floor(Math.random() * 5) - 2));
          if (world[sy][sx] === 'air') {
            mobs.push({ x: sx * TILE, y: sy * TILE, w: 22, h: 26, vx: 0, vy: 0, hp: 30, type: Math.random() < 0.5 ? 'zombie' : 'skeleton' });
            showMessage('⚠️ 怪物出现！');
          }
        }
      }
      // 怪物移动与碰撞扣血
      mobDmgAccum += dt;
      for (let i = mobs.length - 1; i >= 0; i--) {
        const m = mobs[i];
        // 移向玩家
        const dx = player.x - m.x;
        const speed = 72;
        m.vx += Math.sign(dx) * speed * dt * 4;
        m.vx *= 0.85;
        m.x += m.vx * dt;
        m.y += m.vy * dt;
        // 重力
        m.vy += 600 * dt;
        m.vy = Math.min(m.vy, 400);
        // 碰撞地面
        const my1 = Math.floor(m.y / TILE);
        const my2 = Math.floor((m.y + m.h) / TILE);
        const mx1 = Math.floor((m.x + 4) / TILE);
        const mx2 = Math.floor((m.x + m.w - 4) / TILE);
        if (world[my2] && world[my2][mx1] !== 'air' && world[my2][mx1] !== 'water' && world[my2][mx1] !== 'poison_gas') {
          m.y = my2 * TILE - m.h;
          m.vy = 0;
        }
        // 碰到玩家扣血
        if (mobDmgAccum >= 1) {
          if (Math.abs(m.x - player.x) < (m.w + player.w) * 0.6 && Math.abs(m.y - player.y) < (m.h + player.h) * 0.6) {
            player.health = Math.max(0, player.health - 5);
            if (Math.random() < 0.1) showMessage('👊 受到攻击！');
          }
        }
      }
      if (mobDmgAccum >= 1) mobDmgAccum = 0;
      // ── 蝙蝠AI ──
      for (const m of mobs) {
        if (m.type !== 'bat') continue;
        const bdx = player.x - m.x, bdy = player.y - m.y;
        const bdist = Math.sqrt(bdx*bdx + bdy*bdy);
        m.wingAngle = (m.wingAngle||0) + dt*18;
        m.wanderTimer = (m.wanderTimer||0) - dt;
        if (bdist < 120) {
          m.vx += (bdx/bdist)*70*dt*3 + (Math.random()-0.5)*20*dt;
          m.vy += (bdy/bdist)*70*dt*3 + (Math.random()-0.5)*20*dt;
        } else if (m.wanderTimer <= 0) {
          m.wanderTimer = 0.5+Math.random();
          const a = Math.random()*Math.PI*2;
          m.vx = Math.cos(a)*40; m.vy = Math.sin(a)*40;
        }
        const spd = Math.sqrt(m.vx*m.vx+m.vy*m.vy);
        if (spd>120) { m.vx=m.vx/spd*120; m.vy=m.vy/spd*120; }
        m.vx*=0.92; m.vy*=0.92;
        m.x += m.vx*dt; m.y += m.vy*dt;
        m.attackCooldown = Math.max(0, (m.attackCooldown||0)-dt);
        if (bdist<18 && (m.attackCooldown||0)<=0) {
          player.health = Math.max(0, player.health-2);
          m.attackCooldown = 0.8;
          spawnParticles(player.x, player.y, '#f44', 3);
        }
      }
      // 大黄蜂生成（每10秒从天上出现，30秒找不到玩家则落地近战）
      beeSpawnAccum += dt;
      if (beeSpawnAccum >= 10 && bees.length < 20) {
        beeSpawnAccum = 0;
        const px = Math.floor(player.x / TILE);
        const py = Math.floor(player.y / TILE);
        const bx = Math.max(1, Math.min(WORLD_W - 2, px + Math.floor(Math.random() * 9) - 4));
        const by = Math.max(1, Math.min(Math.floor(WORLD_H / 2), py - 10 - Math.floor(Math.random() * 10)));
        bees.push({ x: bx * TILE, y: by * TILE, w: 24, h: 20, vx: 0, vy: 0, hp: 10, shootTimer: Math.random() * 2, moveTimer: 0, targetX: 0, targetY: 0, grounded: false, seekTimer: 0 });
        if (bees.length === 1) showMessage('🐝 大黄蜂来袭！');
      }
      // 大黄蜂行为（实体化：追踪→30秒找不到玩家则落地近战）
      for (let i = bees.length - 1; i >= 0; i--) {
        const b = bees[i];
        const bdx = player.x - b.x, bdy = player.y - b.y, bdist = Math.hypot(bdx, bdy);
        if (bdist < TILE * 18) b.seekTimer = 0; else b.seekTimer += dt;
        if (!b.grounded && b.seekTimer >= 30) { b.grounded = true; b.vx = 0; b.vy = 0; showMessage('🐝 大黄蜂落地变近战！'); }
        if (b.grounded) {
          b.vy += 600 * dt; b.vy = Math.min(b.vy, 400); b.y += b.vy * dt;
          b.x += Math.sign(bdx) * 110 * dt;
          const bmy2 = Math.floor((b.y + b.h) / TILE), bmx = Math.floor((b.x + b.w / 2) / TILE);
          if (bmy2 >= 0 && bmy2 < WORLD_H && bmx >= 0 && bmx < WORLD_W && world[bmy2][bmx] !== 'air') { b.vy = 0; b.y = bmy2 * TILE - b.h; }
          if (bdist < (b.w + player.w) * 0.7) player.health = Math.max(0, player.health - 0.5 * dt);
          // 落地也能射
          b.shootTimer -= dt;
          if (b.shootTimer <= 0 && bdist < TILE * 15) {
            b.shootTimer = 1.8 + Math.random();
            beeStingers.push({ x: b.x + b.w / 2, y: b.y + b.h / 2, vx: bdx / Math.max(1, bdist) * 180, vy: bdy / Math.max(1, bdist) * 180, life: 3 });
          }
        } else {
          b.moveTimer -= dt;
          if (b.moveTimer <= 0) {
            b.moveTimer = 1 + Math.random() * 2;
            const playerTy = Math.floor(player.y / TILE);
            const beeMinY = Math.max(1, playerTy - 20);
            const beeMaxY = Math.max(beeMinY + 1, playerTy - 10);
            const beeY = Math.max(1, Math.min(Math.floor(WORLD_H / 2), beeMinY + Math.floor(Math.random() * Math.max(1, beeMaxY - beeMinY))));
            const beeX = Math.max(1, Math.min(WORLD_W - 2, Math.floor(player.x / TILE) + Math.floor(Math.random() * 9) - 4));
            b.targetX = beeX * TILE; b.targetY = beeY * TILE;
          }
          const ddx2 = b.targetX - b.x, ddy2 = b.targetY - b.y;
          b.vx += ddx2 * 0.5; b.vy += ddy2 * 0.5; b.vx *= 0.92; b.vy *= 0.92;
          b.x += b.vx * dt; b.y += b.vy * dt;
          b.shootTimer -= dt;
          if (b.shootTimer <= 0 && bdist < TILE * 15) {
            b.shootTimer = 1.8 + Math.random();
            beeStingers.push({ x: b.x + b.w / 2, y: b.y + b.h / 2, vx: bdx / Math.max(1, bdist) * 180, vy: bdy / Math.max(1, bdist) * 180, life: 3 });
          }
        }
        if (b.hp <= 0) { bees.splice(i, 1); showMessage('🐝 消灭大黄蜂！'); }
      }
      // 毒针移动
      for (let i = beeStingers.length - 1; i >= 0; i--) {
        const s = beeStingers[i];
        s.x += s.vx * dt; s.y += s.vy * dt; s.life -= dt;
        if (s.life <= 0) { beeStingers.splice(i, 1); continue; }
        const sbx = Math.floor(s.x / TILE), sby = Math.floor(s.y / TILE);
        if (sbx >= 0 && sbx < WORLD_W && sby >= 0 && sby < WORLD_H && world[sby][sbx] !== 'air') { beeStingers.splice(i, 1); continue; }
        if (Math.abs(s.x - player.x) < (player.w + 8) * 0.5 && Math.abs(s.y - player.y) < (player.h + 8) * 0.5) { player.health = Math.max(0, player.health - 3); beeStingers.splice(i, 1); }
      }
      // Boss已取消

      // 火焰粒子更新
      for (let i = fireParticles.length - 1; i >= 0; i--) {
        fireParticles[i].life -= dt;
        fireParticles[i].x += fireParticles[i].vx * dt;
        fireParticles[i].y += fireParticles[i].vy * dt;
        fireParticles[i].vy += 30 * dt;
        if (fireParticles[i].life <= 0) fireParticles.splice(i, 1);
      }
      // 玩家接触火焰扣血
      if (mobDmgAccum >= 1) {
        const pbx = Math.floor(player.x / TILE);
        const pby = Math.floor(player.y / TILE);
        for (let dy = 0; dy <= 1; dy++) {
          for (let dx = 0; dx <= 1; dx++) {
            if (world[pby + dy] && (world[pby + dy][pbx + dx] === 'fire' || fireParticles.some(f => Math.abs(f.x - player.x) < 30 && Math.abs(f.y - player.y) < 30))) {
              player.health = Math.max(0, player.health - 3);
              break;
            }
          }
        }
      }
      updateCamera();
      updateHud();
    }

    function targetFromPointer() {
      const cx = mouse.x + camera.x;
      const cy = mouse.y + camera.y;
      const playerCx = player.x + player.w / 2;
      const playerCy = player.y + player.h / 2;
      const dx = cx - playerCx;
      const dy = cy - playerCy;
      const len = Math.max(1, Math.hypot(dx, dy));
      const reach = Math.min(len, TILE * 5.1);
      return { x: Math.floor((playerCx + dx / len * reach) / TILE), y: Math.floor((playerCy + dy / len * reach) / TILE) };
    }

    function mineAtPointer(dt) {
      const t = targetFromPointer();
      mineBlock(t.x, t.y, dt);
    }

    function updateCamera() {
      camera.x += (player.x + player.w / 2 - canvas.width / 2 - camera.x) * 0.08;
      camera.y += (player.y + player.h / 2 - canvas.height / 2 - camera.y) * 0.08;
      camera.x = Math.max(0, Math.min(WORLD_W * TILE - canvas.width, camera.x));
      camera.y = Math.max(0, Math.min(WORLD_H * TILE - canvas.height, camera.y));
    }

    function draw() {
      const day = Math.sin(time * Math.PI * 2) * 0.5 + 0.5;
      const skyTop = lerpColor([16, 22, 42], [86, 168, 226], day);
      const skyBottom = lerpColor([41, 35, 58], [212, 232, 198], day);
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, `rgb(${skyTop.join(',')})`);
      grad.addColorStop(1, `rgb(${skyBottom.join(',')})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawSunMoon(day);
      drawClouds();
      ctx.save();
      ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));
      drawWorld(day);
      drawBoss(day);
      drawMobs(day);
      drawBees(day);
      drawStingers();
      drawParticles();
      drawPlayer();
      drawMinimap();
      // ── 休息状态遮罩 ──
      if (gameState === 'resting') {
        ctx.fillStyle = 'rgba(5,5,15,0.88)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#c8a96e';
        ctx.font = 'bold 28px "Microsoft YaHei"';
        ctx.textAlign = 'center';
        ctx.fillText('🌙 休息中...', canvas.width/2, canvas.height/2 - 60);
        ctx.font = '18px "Microsoft YaHei"';
        ctx.fillStyle = '#888';
        const rStart = parseInt(localStorage.getItem(LOCK_KEY+'_start') || '0');
        const rEnd   = parseInt(localStorage.getItem(LOCK_KEY+'_end')   || '0');
        ctx.fillText('休息开始: ' + new Date(rStart).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}), canvas.width/2, canvas.height/2 - 20);
        ctx.fillText('休息结束: ' + new Date(rEnd).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}), canvas.width/2, canvas.height/2 + 8);
        ctx.fillStyle = '#555';
        ctx.font = '14px "Microsoft YaHei"';
        ctx.fillText('（休息时间由系统控制，禁止刷新打断）', canvas.width/2, canvas.height/2 + 40);
        ctx.textAlign = 'left';
      }
      // ── 剩余<5分钟时显示倒计时 ──
      if (gameState === 'playing') {
        const elapsed = Date.now() - parseInt(localStorage.getItem(gameStartKey) || Date.now().toString());
        const remaining = LOCK_DURATION_MS - elapsed;
        if (remaining > 0 && remaining < 5 * 60 * 1000) {
          const mins = Math.ceil(remaining / 60000);
          ctx.fillStyle = 'rgba(200,100,0,0.75)';
          ctx.font = 'bold 14px "Microsoft YaHei"';
          ctx.textAlign = 'right';
          ctx.fillText('⏰ ' + mins + '分钟后休息', canvas.width - 10, 22);
          ctx.textAlign = 'left';
        }
      }
      drawTarget();
      ctx.restore();
      if (day < 0.25) {
        ctx.fillStyle = `rgba(4, 8, 24, ${0.38 - day})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawSunMoon(day) {
      const angle = time * Math.PI * 2;
      const x = canvas.width * (0.5 + Math.cos(angle - Math.PI) * 0.42);
      const y = canvas.height * (0.55 + Math.sin(angle - Math.PI) * 0.5);
      ctx.fillStyle = day > 0.35 ? '#ffe08a' : '#dce8ff';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 35;
      ctx.beginPath();
      ctx.arc(x, y, day > 0.35 ? 34 : 24, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawClouds() {
      ctx.fillStyle = 'rgba(255, 246, 220, 0.72)';
      for (const c of clouds) {
        const x = c.x - camera.x * 0.22 - 260;
        const y = c.y - camera.y * 0.05;
        ctx.fillRect(x, y, 120 * c.s, 22 * c.s);
        ctx.fillRect(x + 30 * c.s, y - 16 * c.s, 80 * c.s, 26 * c.s);
        ctx.fillRect(x + 82 * c.s, y + 10 * c.s, 70 * c.s, 18 * c.s);
      }
    }

    // 小地图
    function drawMinimap() {
      const mw = 100, mh = 70, mx = canvas.width - mw - 8, my = 8;
      ctx.save();
      // 背景
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(mx - 2, my - 2, mw + 4, mh + 4);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(mx - 2, my - 2, mw + 4, mh + 4);
      const scaleX = mw / (canvas.width / TILE * 3), scaleY = mh / (canvas.height / TILE * 3);
      const vw = canvas.width / TILE * 3, vh = canvas.height / TILE * 3;
      const startX = Math.max(0, Math.floor(camera.x / TILE) - 2);
      const startY = Math.max(0, Math.floor(camera.y / TILE) - 2);
      const endX = Math.min(WORLD_W, startX + Math.ceil(vw));
      const endY = Math.min(WORLD_H, startY + Math.ceil(vh));
      for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
          const t = world[y] && world[y][x];
          if (!t || t === 'air') continue;
          const b = BLOCKS[t];
          if (!b) continue;
          ctx.fillStyle = b.color || '#888';
          const rx = mx + (x - startX) * (mw / (endX - startX));
          const ry = my + (y - startY) * (mh / (endY - startY));
          ctx.fillRect(rx, ry, Math.max(1, mw / (endX - startX)), Math.max(1, mh / (endY - startY)));
        }
      }
      // 玩家位置
      const px2 = mx + (Math.floor(player.x / TILE) - startX) * (mw / (endX - startX));
      const py2 = my + (Math.floor(player.y / TILE) - startY) * (mh / (endY - startY));
      ctx.fillStyle = '#fff';
      ctx.fillRect(px2 - 1, py2 - 1, 3, 3);
      ctx.restore();
    }

    function drawWorld(day) {
      const startX = Math.max(0, Math.floor(camera.x / TILE) - 1);
      const endX = Math.min(WORLD_W, Math.ceil((camera.x + canvas.width) / TILE) + 1);
      const startY = Math.max(0, Math.floor(camera.y / TILE) - 1);
      const endY = Math.min(WORLD_H, Math.ceil((camera.y + canvas.height) / TILE) + 1);
      for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
          const type = getBlock(x, y);
          if (type === 'air') continue;
          const b = BLOCKS[type];
          const px = x * TILE, py = y * TILE;
          ctx.fillStyle = shade(b.color, y, day, type);
          ctx.fillRect(px, py, TILE, TILE);
          if (type !== 'water') {
            ctx.fillStyle = 'rgba(255,255,255,0.10)';
            ctx.fillRect(px, py, TILE, 3);
            ctx.fillStyle = 'rgba(0,0,0,0.18)';
            ctx.fillRect(px, py + TILE - 4, TILE, 4);
            ctx.strokeStyle = 'rgba(0,0,0,0.22)';
            ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
          } else {
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.fillRect(px, py + 6 + Math.sin(time * 18 + x) * 2, TILE, 3);
          }
          if (b.emoji && ['coal', 'iron', 'torch'].includes(type)) {
            ctx.font = '20px serif';
            ctx.fillText(b.emoji, px + 6, py + 23);
          }
        }
      }
      // 火把光照覆盖层
      const ptx = Math.floor(player.x / TILE), pty = Math.floor(player.y / TILE);
      const lightR = 5; // 光照半径（格）
      const darkAlpha = Math.max(0, 1 - (time - 0.25) * 2.5);
      if (darkAlpha > 0) {
        // 计算玩家周围有多少火把
        let nearTorch = false;
        outer:
        for (let ty2 = pty - lightR; ty2 <= pty + lightR; ty2++) {
          for (let tx2 = ptx - lightR; tx2 <= ptx + lightR; tx2++) {
            if (getBlock(tx2, ty2) === 'torch') { nearTorch = true; break outer; }
          }
        }
        const finalAlpha = nearTorch ? Math.max(0, darkAlpha - 0.5) : darkAlpha;
        if (finalAlpha > 0) {
          ctx.save();
          ctx.globalAlpha = finalAlpha * 0.75;
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          // 挖掉玩家周围光照圆
          ctx.globalCompositeOperation = 'destination-out';
          const pcx = player.x + player.w / 2 - camera.x;
          const pcy = player.y + player.h / 2 - camera.y;
          const grd = ctx.createRadialGradient(pcx, pcy, 2, pcx, pcy, lightR * TILE);
          grd.addColorStop(0, 'rgba(0,0,0,1)');
          grd.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = grd;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.restore();
        }
      }
    }

    function drawBoss(day) {
      if (!boss) return;
      const sx = boss.x - camera.x, sy = boss.y - camera.y;
      if (sx < -60 || sx > canvas.width + 60 || sy < -60 || sy > canvas.height + 60) return;
      ctx.save();
      ctx.translate(sx + boss.w / 2, sy + boss.h / 2);
      if (boss.facing < 0) ctx.scale(-1, 1);
      const bodyColor = boss.wakeFlash || (!boss.awake ? '#4a0000' : '#8b0000');
      ctx.fillStyle = bodyColor;
      ctx.fillRect(-boss.w/2, -boss.h/2 + 10, boss.w, boss.h - 10);
      ctx.fillStyle = !boss.awake ? '#3a0000' : '#cc1111';
      ctx.fillRect(-boss.w/2 + 4, -boss.h/2, boss.w - 8, 20);
      ctx.fillStyle = '#222';
      ctx.fillRect(-boss.w/2 + 2, -boss.h/2 - 10, 7, 12);
      ctx.fillRect(boss.w/2 - 9, -boss.h/2 - 10, 7, 12);
      if (boss.awake) {
        const armSwing = Math.sin(Date.now() / 200) * 0.4;
        ctx.save();
        ctx.translate(boss.w/2 - 4, -boss.h/2 + 12);
        ctx.rotate(-0.8 + armSwing);
        ctx.fillStyle = '#aaa'; ctx.fillRect(0, -2, 20, 4);
        ctx.fillStyle = '#666'; ctx.fillRect(0, -3, 4, 6);
        ctx.restore();
      }
      ctx.fillStyle = boss.awake ? '#ffff00' : '#888';
      ctx.fillRect(-7, -boss.h/2 + 7, 5, 5);
      ctx.fillRect(2, -boss.h/2 + 7, 5, 5);
      ctx.restore();
      ctx.fillStyle = '#333'; ctx.fillRect(sx - 2, sy - 22, boss.w + 4, 8);
      ctx.fillStyle = boss.awake ? '#f00' : '#a00';
      ctx.fillRect(sx, sy - 20, boss.w * (boss.hp / boss.maxHp), 4);
      ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif';
      if (!boss.awake) ctx.fillText('💤 ' + Math.ceil(3 - boss.awakeTimer) + 's', sx, sy - 26);
      else ctx.fillText('👹', sx, sy - 26);
      for (const fb of bossFireballs) {
        const fsx = fb.x - camera.x, fsy = fb.y - camera.y;
        ctx.fillStyle = '#f80';
        ctx.beginPath(); ctx.arc(fsx, fsy, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ff0';
        ctx.beginPath(); ctx.arc(fsx, fsy, 3, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawBees(day) {
      for (const b of bees) {
        const sx = b.x - camera.x, sy = b.y - camera.y;
        if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) continue;
        ctx.save();
        ctx.translate(sx + b.w / 2, sy + b.h / 2);
        // 身体
        ctx.fillStyle = b.grounded ? '#8B6914' : '#FFD700';
        ctx.beginPath();
        ctx.ellipse(0, 0, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        // 条纹
        ctx.fillStyle = '#222';
        for (let si = -2; si <= 2; si++) ctx.fillRect(-b.w / 2 + 2, si * 4 - 1, b.w - 4, 2);
        // 眼睛
        ctx.fillStyle = '#f00';
        ctx.fillRect(-4, -3, 3, 3); ctx.fillRect(1, -3, 3, 3);
        // 翅膀
        const wingOff = Math.sin(Date.now() / 80) * 3;
        ctx.fillStyle = 'rgba(200,220,255,0.6)';
        ctx.fillRect(-b.w / 2 - 4, -b.h / 2 + wingOff, 5, 8);
        ctx.fillRect(b.w / 2 - 1, -b.h / 2 + wingOff, 5, 8);
        ctx.restore();
        // 血条
        if (b.hp < 10) {
          ctx.fillStyle = '#333'; ctx.fillRect(sx, sy - 8, b.w, 4);
          ctx.fillStyle = '#0f0'; ctx.fillRect(sx, sy - 8, b.w * (b.hp / 10), 4);
        }
      }
    }

    function drawStingers() {
      for (const s of beeStingers) {
        const sx = s.x - camera.x, sy = s.y - camera.y;
        if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) continue;
        ctx.save();
        ctx.translate(sx, sy);
        const angle = Math.atan2(s.vy, s.vx);
        ctx.rotate(angle);
        ctx.fillStyle = '#4a2';
        ctx.beginPath();
        ctx.moveTo(8, 0); ctx.lineTo(-4, -3); ctx.lineTo(-4, 3);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#f80';
        ctx.fillRect(-4, -1.5, 6, 3);
        ctx.restore();
      }
    }

    function drawMobs(day) {
      for (const m of mobs) {
        if (m.type === 'bat') {
          // 蝙蝠：两个翅膀拍打
          const sx = m.x - camera.x, sy = m.y - camera.y;
          if (sx < -30 || sx > canvas.width + 30 || sy < -30 || sy > canvas.height + 30) continue;
          ctx.save();
          ctx.translate(sx + m.w / 2, sy + m.h / 2);
          const wing = Math.sin(m.wingAngle) * 4;
          // 左翅
          ctx.fillStyle = '#5a3825';
          ctx.beginPath();
          ctx.ellipse(-8 - wing, 0, 8, 5, -0.3, 0, Math.PI * 2);
          ctx.fill();
          // 右翅
          ctx.beginPath();
          ctx.ellipse(8 + wing, 0, 8, 5, 0.3, 0, Math.PI * 2);
          ctx.fill();
          // 身体
          ctx.fillStyle = '#7a4f35';
          ctx.beginPath();
          ctx.ellipse(0, 0, 5, 7, 0, 0, Math.PI * 2);
          ctx.fill();
          // 耳朵
          ctx.fillStyle = '#5a3825';
          ctx.beginPath();
          ctx.moveTo(-3, -6); ctx.lineTo(-5, -12); ctx.lineTo(-1, -7); ctx.fill();
          ctx.beginPath();
          ctx.moveTo(3, -6); ctx.lineTo(5, -12); ctx.lineTo(1, -7); ctx.fill();
          // 眼睛
          ctx.fillStyle = '#ff4444';
          ctx.fillRect(-3, -2, 2, 2);
          ctx.fillRect(1, -2, 2, 2);
          ctx.restore();
          // 血条（血少时）
          if (m.hp < m.maxHp) {
            ctx.fillStyle = '#333'; ctx.fillRect(sx, sy - 8, m.w, 4);
            ctx.fillStyle = '#f44'; ctx.fillRect(sx, sy - 8, m.w * (m.hp / m.maxHp), 4);
          }
          continue;
        }
        const sx = m.x - camera.x;
        const sy = m.y - camera.y;
        if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) continue;
        const facing = m.vx >= 0 ? 1 : -1;
        ctx.save();
        ctx.translate(sx + m.w / 2, sy + m.h / 2);
        if (facing < 0) ctx.scale(-1, 1);
        ctx.fillStyle = m.type === 'zombie' ? '#2d5a1e' : '#8a7a6a';
        ctx.fillRect(-m.w / 2, -m.h / 2 + 4, m.w, m.h - 4);
        ctx.fillStyle = m.type === 'zombie' ? '#4a7a30' : '#c4a882';
        ctx.fillRect(-m.w / 2 + 3, -m.h / 2, m.w - 6, 12);
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(-4, -m.h / 2 + 3, 3, 3);
        ctx.fillRect(1, -m.h / 2 + 3, 3, 3);
        ctx.fillStyle = '#333';
        ctx.fillRect(-m.w / 2 + 2, m.h / 2 - 6, 8, 6);
        ctx.fillRect(m.w / 2 - 10, m.h / 2 - 6, 8, 6);
        ctx.restore();
      }
    }

    function drawPlayer() {
      const x = player.x, y = player.y;
      const f = player.facing;  // 1=右 -1=左
      const moving = Math.abs(player.vx) > 0.5 && player.grounded;
      const jumping = !player.grounded && player.vy < -50;
      const falling = !player.grounded && player.vy > 50;
      const wc = Math.sin(player.walkCycle) * (moving ? 1 : 0);
      const breath = Math.sin(player.breathCycle) * 0.6;
      const swing = player.armSwing;
      ctx.save();
      ctx.translate(Math.floor(x + 10.5), Math.floor(y + 14));
      if (f < 0) ctx.scale(-1, 1);
      ctx.translate(-10.5, -14);

      // 阴影
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(10.5, 29, 8, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // ── 腿 ──
      const legY = 24, legW = 6, legH = 8;
      if (jumping) {
        // 跳跃：双腿收起
        ctx.fillStyle = '#2a4e9f';
        ctx.fillRect(4, legY + 1, legW, legH - 2);
        ctx.fillRect(11, legY + 1, legW, legH - 2);
      } else if (falling) {
        // 下落：双腿张开
        ctx.fillStyle = '#2a4e9f';
        ctx.fillRect(2, legY + 2, legW, legH);
        ctx.fillRect(13, legY + 2, legW, legH);
      } else if (moving) {
        // 走路：左右交替
        const lL = Math.sin(player.walkCycle) * 3;
        const rL = -Math.sin(player.walkCycle) * 3;
        ctx.fillStyle = '#2a4e9f';
        ctx.fillRect(4 + lL, legY, legW, legH);
        ctx.fillRect(11 + rL, legY, legW, legH);
      } else {
        // 站立：轻微呼吸
        ctx.fillStyle = '#2a4e9f';
        ctx.fillRect(4, legY - breath * 0.3, legW, legH);
        ctx.fillRect(11, legY - breath * 0.3, legW, legH);
      }

      // ── 身体 ──
      ctx.fillStyle = '#2f7dbe';
      const bodyY = 12 + breath * 0.4;
      ctx.fillRect(3, bodyY, 15, 13);

      // T恤图案（随呼吸微动）
      ctx.fillStyle = '#3a90cc';
      ctx.fillRect(7, bodyY + 3, 7, 4);

      // ── 手臂 ──
      const armY = bodyY + 2;
      if (swing !== 0) {
        // 挖掘中：手臂上下挥动
        ctx.save();
        ctx.translate(0, 6);
        ctx.rotate(swing);
        ctx.fillStyle = '#c98856';
        ctx.fillRect(-1, -1, 5, 10); // 左臂
        ctx.restore();
        ctx.save();
        ctx.translate(18, 6);
        ctx.rotate(-swing);
        ctx.fillStyle = '#c98856';
        ctx.fillRect(-4, -1, 5, 10); // 右臂（挥向目标）
        ctx.restore();
      } else if (moving) {
        // 走路：手臂摆动（与腿反向）
        const aSwing = Math.sin(player.walkCycle) * 0.4;
        ctx.fillStyle = '#c98856';
        ctx.save(); ctx.translate(0, armY); ctx.rotate(aSwing); ctx.fillRect(-1, -1, 5, 9); ctx.restore();
        ctx.save(); ctx.translate(18, armY); ctx.rotate(-aSwing); ctx.fillRect(-4, -1, 5, 9); ctx.restore();
      } else {
        // 站立：手臂自然下垂轻微摆动
        ctx.fillStyle = '#c98856';
        ctx.fillRect(0, armY + breath * 0.2, 5, 9);
        ctx.fillRect(16, armY + breath * 0.2, 5, 9);
      }

      // ── 头 ──
      ctx.fillStyle = '#c98856';
      ctx.fillRect(2, 2, 17, 13);
      // 头发
      ctx.fillStyle = '#3a2010';
      ctx.fillRect(2, 1, 17, 5);
      // 眼睛（朝facing方向）
      ctx.fillStyle = '#2b1a11';
      ctx.fillRect(13, 7, 3, 3);
      // 嘴巴
      ctx.fillStyle = '#b07050';
      ctx.fillRect(12, 11, 4, 2);

      // ── 轮廓 ──
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(2, 2, 17, 13);
      ctx.strokeRect(3, bodyY, 15, 13);

      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life * 1.6);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - camera.x, p.y - camera.y, 5, 5);
      }
      ctx.globalAlpha = 1;
    }

    function drawTarget() {
      const t = targetFromPointer();
      if (getBlock(t.x, t.y) !== 'air') {
        ctx.strokeStyle = '#ffe17a';
        ctx.lineWidth = 3;
        ctx.strokeRect(t.x * TILE + 2, t.y * TILE + 2, TILE - 4, TILE - 4);
        if (mineTarget && mineTarget.x === t.x && mineTarget.y === t.y) {
          const p = Math.min(1, mineProgress / BLOCKS[getBlock(t.x, t.y)].hardness);
          ctx.fillStyle = 'rgba(255,225,122,0.32)';
          ctx.fillRect(t.x * TILE + 4, t.y * TILE + TILE - 8, (TILE - 8) * p, 4);
        }
      }
    }

    function shade(color, y, day, type) {
      if (type === 'water') return color;
      const depth = Math.max(0, y - 30) * 0.012;
      const night = (1 - day) * 0.28;
      return mixCssColor(color, '#050713', Math.min(0.58, depth + night));
    }

    function lerpColor(a, b, t) {
      return a.map((v, i) => Math.round(v + (b[i] - v) * t));
    }

    function mixCssColor(hex, target, amount) {
      const a = hexToRgb(hex);
      const b = hexToRgb(target);
      const mixed = lerpColor(a, b, amount);
      return `rgb(${mixed.join(',')})`;
    }

    function hexToRgb(hex) {
      if (hex.startsWith('rgba')) return [64, 145, 214];
      const h = hex.replace('#', '');
      return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
    }

    function updateHud() {
      document.querySelector('#health .fill').style.width = player.health + '%';
      document.querySelector('#hunger .fill').style.width = player.hunger + '%';
      document.querySelector('#stamina .fill').style.width = player.stamina + '%';
      document.querySelector('#health b').textContent = Math.round(player.health);
      document.querySelector('#hunger b').textContent = Math.round(player.hunger);
      document.querySelector('#stamina b').textContent = Math.round(player.stamina);
      const hour = Math.floor(time * 24);
      document.getElementById('worldInfo').textContent = `坐标 ${Math.floor(player.x / TILE)}, ${Math.floor(player.y / TILE)} · ${String(hour).padStart(2, '0')}:00`;
      renderInventory();
      if (messageTimer > 0) {
        messageTimer -= 1 / 60;
        if (messageTimer <= 0) document.getElementById('message').classList.remove('show');
      }
    }

    function renderInventory() {
      const el = document.getElementById('inventory');
      el.innerHTML = HOTBAR.map((type, i) => `
        <div class="slot ${i === selected ? 'active' : ''}" data-slot="${i}">
          <span class="key">${i + 1}</span><span>${BLOCKS[type].emoji || '■'}</span><span class="count">${inventory[type] || 0}</span>
        </div>`).join('');
      for (const slot of el.querySelectorAll('.slot')) {
        slot.addEventListener('pointerdown', () => selected = Number(slot.dataset.slot));
      }
      // 点击空格收起背包
      el.onclick = e => { if (e.target === el) { el.style.display = 'none'; } };
    }

    function showMessage(text) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.classList.add('show');
      messageTimer = 2.1;
    }

    function resize() {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }

    let autoSaveTimer = 0;
    function loop(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
      autoSaveTimer += dt;
      if (autoSaveTimer >= 30) {
        autoSaveTimer = 0;
        localStorage.setItem(SAVE_KEY, JSON.stringify({ world, inventory, player: { x: player.x, y: player.y, health: player.health, hunger: player.hunger }, time, mobs, boss }));
      }
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('keydown', e => {
      keys.add(e.code);
      // 数字键选择快捷栏（0=第10格）
      if (e.code === 'Digit1') selected = 0;
      else if (e.code === 'Digit2') selected = 1;
      else if (e.code === 'Digit3') selected = 2;
      else if (e.code === 'Digit4') selected = 3;
      else if (e.code === 'Digit5') selected = 4;
      else if (e.code === 'Digit6') selected = 5;
      else if (e.code === 'Digit7') selected = 6;
      else if (e.code === 'Digit8') selected = 7;
      else if (e.code === 'Digit9') selected = 8;
      else if (e.code === 'Digit0') selected = 9;
      else if (e.key >= '0' && e.key <= '9') selected = Number(e.key) % 10;
      // 扩展快捷键：- = [ ] 选取10-13格
      else if (e.code === 'Minus') selected = 10;
      else if (e.code === 'BracketLeft') selected = 11;
      else if (e.code === 'BracketRight') selected = 12;
      // 合成快捷键
      if (e.code === 'KeyQ') { craftWorkbench(); renderInventory(); }
      if (e.code === 'KeyE') {
        if (getNearbyWorkbench()) craftAtWorkbench();
        else craftPlanks();
        renderInventory();
      }
      if (e.code === 'KeyT') { craftAtWorkbench(); renderInventory(); }
      if (e.code === 'KeyY') { selected = HOTBAR.indexOf('workbench'); renderInventory(); }
      if (e.code === 'KeyF') { eatApple(); renderInventory(); }
      if (e.code === 'KeyK') { tryCook(); renderInventory(); }
      if (e.code === 'KeyB') { trySleep(); }
      if (e.code === 'KeyB') { trySleep(); }
      if (e.code === 'KeyR') { resetPlayer(true); generateWorld(true); initGame(); }
      if (e.code === 'KeyP') { saveGame(); renderInventory(); }
      if (e.code === 'KeyL') { loadGame(); renderInventory(); }
    });
    window.addEventListener('keyup', e => keys.delete(e.code));
    canvas.addEventListener('pointermove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    canvas.addEventListener('pointerdown', e => {
      mouse.x = e.clientX; mouse.y = e.clientY;
      if (e.button === 2) {
        const cx = mouse.x + camera.x;
        const cy = mouse.y + camera.y;
        let hit = false;
        // 优先攻击Boss
        if (boss && cx >= boss.x && cx <= boss.x + boss.w && cy >= boss.y && cy <= boss.y + boss.h && boss.invincible <= 0) {
          const dmg = inventory.wood_pickaxe > 0 ? 18 : 9;
          boss.hp -= dmg;
          boss.invincible = 0.3;
          showMessage('🔥 攻击BOSS！-' + dmg + ' HP:' + boss.hp + '/300');
          if (boss.hp <= 0) {
            spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#f00', 20);
            spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#ff0', 15);
            inventory.diamond = (inventory.diamond||0) + 3;
            inventory.gold = (inventory.gold||0) + 5;
            inventory.emerald = (inventory.emerald||0) + 2;
            showMessage('🏆 BOSS击杀！掉落钻石x3 金锭x5 绿宝石x2！');
            boss = null; hit = true;
          } else { hit = true; }
        }
        // 攻击普通怪物
        if (!hit) {
          for (let i = mobs.length - 1; i >= 0; i--) {
            const m = mobs[i];
            if (cx >= m.x && cx <= m.x + m.w && cy >= m.y && cy <= m.y + m.h) {
              const dmg = inventory.wood_pickaxe > 0 ? 12 : 6;
              m.hp -= dmg;
              showMessage('⚔️ 攻击！-' + dmg);
              if (m.hp <= 0) {
                mobs.splice(i, 1);
                showMessage('☠️ 击杀怪物！');
              }
              hit = true;
              break;
            }
          }
        }
        if (!hit) placeBlock(targetFromPointer().x, targetFromPointer().y);
      }
    });
    window.addEventListener('pointerup', () => { mouse.down = false; });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    window.addEventListener('beforeunload', () => {
      localStorage.setItem(SAVE_KEY, JSON.stringify({ world, inventory, player: { x: player.x, y: player.y, health: player.health, hunger: player.hunger }, time, mobs, boss }));
    });

    // 可见性变化时保存（切换标签页时）
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ world, inventory, player: { x: player.x, y: player.y, health: player.health, hunger: player.hunger }, time, mobs, boss }));
      }
    });

    for (const button of document.querySelectorAll('[data-key]')) {
      button.addEventListener('pointerdown', e => { e.preventDefault(); keys.add(button.dataset.key); });
      button.addEventListener('pointerup', e => { e.preventDefault(); keys.delete(button.dataset.key); });
      button.addEventListener('pointerleave', () => keys.delete(button.dataset.key));
    }
    document.getElementById('touchMine').addEventListener('pointerdown', e => { e.preventDefault(); mouse.x = innerWidth / 2; mouse.y = innerHeight / 2; mouse.down = true; });
    document.getElementById('touchMine').addEventListener('pointerup', () => { mouse.down = false; mineProgress = 0; mineTarget = null; });
    document.getElementById('touchPlace').addEventListener('pointerdown', e => { e.preventDefault(); mouse.x = innerWidth / 2; mouse.y = innerHeight / 2; const t = targetFromPointer(); placeBlock(t.x, t.y); });

    resize();
    const savedData = localStorage.getItem(SAVE_KEY);
    if (savedData) {
      try {
        const data = JSON.parse(savedData);
        world = data.world;
        Object.assign(inventory, data.inventory);
        Object.assign(player, data.player, { vx: 0, vy: 0 });
        time = data.time || 0.18;
        camera.x = player.x - innerWidth / 2;
        camera.y = player.y - innerHeight / 2;
        showMessage('存档已读取。');
      } catch (e) {
        generateWorld(true);
      }
    } else {
      generateWorld(true);
    }
    renderInventory();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
