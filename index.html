<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Web 平衡版</title>
  <style>
    :root {
      --ink: #f6efd8;
      --shadow: rgba(16, 9, 4, 0.58);
      --panel: rgba(31, 24, 15, 0.72);
      --panel-strong: rgba(18, 14, 9, 0.88);
      --gold: #f3c35c;
      --green: #7ec850;
      --red: #d96854;
      --blue: #6ab8ff;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0f1b24;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      user-select: none;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 25% 18%, rgba(255, 220, 122, 0.18), transparent 28%),
        radial-gradient(circle at 78% 8%, rgba(101, 180, 255, 0.14), transparent 31%),
        linear-gradient(120deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 9px);
      mix-blend-mode: screen;
      z-index: 3;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      text-shadow: 0 2px 0 #23170d, 0 0 12px rgba(0,0,0,0.45);
    }

    .topbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .card {
      pointer-events: auto;
      background: var(--panel);
      border: 2px solid rgba(255, 233, 174, 0.32);
      box-shadow: 0 10px 32px var(--shadow), inset 0 0 0 2px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
      border-radius: 0;
      padding: 10px 12px;
    }

    .brand {
      min-width: 250px;
      transform: skewX(-3deg);
    }

    .brand h1 {
      margin: 0 0 5px;
      color: var(--gold);
      font-size: 24px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand p, .help p {
      margin: 3px 0;
      font-size: 13px;
      line-height: 1.25;
    }

    .stats {
      min-width: 244px;
    }

    .meter {
      display: grid;
      grid-template-columns: 56px 1fr 34px;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
      font-size: 13px;
    }

    .bar {
      height: 13px;
      border: 2px solid rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.35);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.55);
    }

    .fill { height: 100%; transition: width 0.2s ease; }
    #health .fill { background: linear-gradient(90deg, #8e1f18, var(--red)); }
    #hunger .fill { background: linear-gradient(90deg, #b96b21, #f0a33b); }
    #stamina .fill { background: linear-gradient(90deg, #267ba8, var(--blue)); }

    .inventory {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      padding: 8px;
      pointer-events: auto;
    }

    .slot {
      width: 48px;
      height: 48px;
      position: relative;
      border: 3px solid rgba(255, 238, 194, 0.28);
      background: rgba(23, 16, 10, 0.78);
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.24), 0 6px 18px rgba(0,0,0,0.28);
      display: grid;
      place-items: center;
      font-size: 22px;
    }

    .slot.active {
      border-color: var(--gold);
      transform: translateY(-5px);
      box-shadow: 0 0 0 3px rgba(243,195,92,0.2), 0 10px 25px rgba(0,0,0,0.38);
    }

    .count {
      position: absolute;
      right: 4px;
      bottom: 2px;
      font: 700 13px Verdana, sans-serif;
      color: white;
    }

    .key {
      position: absolute;
      left: 4px;
      top: 2px;
      font: 700 10px Verdana, sans-serif;
      color: rgba(255,255,255,0.72);
    }

    .help {
      position: absolute;
      right: 14px;
      bottom: 96px;
      max-width: 286px;
      pointer-events: auto;
    }

    .message {
      position: absolute;
      left: 50%;
      top: 86px;
      transform: translateX(-50%);
      padding: 9px 16px;
      background: rgba(0,0,0,0.58);
      border: 2px solid rgba(255,255,255,0.16);
      opacity: 0;
      transition: opacity 0.2s ease;
      font-size: 15px;
      text-align: center;
    }

    .message.show { opacity: 1; }

    .crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
    }

    .crosshair::before, .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 0 4px #000;
    }

    .crosshair::before { left: 10px; top: 0; width: 2px; height: 22px; }
    .crosshair::after { top: 10px; left: 0; width: 22px; height: 2px; }

    .touch-controls {
      position: absolute;
      inset: auto 0 0 0;
      display: none;
      justify-content: space-between;
      padding: 18px;
      pointer-events: none;
    }

    .pad, .actions { pointer-events: auto; }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 5px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 62px);
      gap: 8px;
      align-content: end;
    }

    button {
      color: var(--ink);
      background: var(--panel-strong);
      border: 2px solid rgba(255, 233, 174, 0.35);
      box-shadow: 0 5px 0 rgba(0,0,0,0.28);
      font: 700 13px Georgia, serif;
    }

    button:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.28); }
    .blank { visibility: hidden; }

    @media (max-width: 820px), (pointer: coarse) {
      .touch-controls { display: flex; }
      .help { display: none; }
      .brand { min-width: 0; max-width: 52vw; }
      .brand h1 { font-size: 17px; }
      .brand p { font-size: 11px; }
      .stats { min-width: 178px; }
      .meter { grid-template-columns: 38px 1fr 26px; font-size: 11px; }
      .inventory { bottom: 118px; gap: 4px; }
      .slot { width: 43px; height: 43px; font-size: 20px; border-width: 2px; }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Minecraft Web sandbox game"></canvas>
  <div class="hud">
    <div class="topbar">
      <section class="card brand">
        <h1>Minecraft Web</h1>
        <p>平衡版：采集、建造、生存、昼夜循环。</p>
        <p id="worldInfo">正在生成世界...</p>
      </section>
      <section class="card stats">
        <div class="meter" id="health"><span>生命</span><div class="bar"><div class="fill"></div></div><b>100</b></div>
        <div class="meter" id="hunger"><span>饥饿</span><div class="bar"><div class="fill"></div></div><b>100</b></div>
        <div class="meter" id="stamina"><span>体力</span><div class="bar"><div class="fill"></div></div><b>100</b></div>
      </section>
    </div>
    <div class="message" id="message"></div>
    <div class="crosshair"></div>
    <section class="card inventory" id="inventory"></section>
    <section class="card help">
      <p><b>操作</b> WASD移动，空格跳跃，Shift疾跑。左键挖掘，右键攻击，F射击，H吃苹果。</p>
      <p>1-9/0/-选择快捷栏，E木板，Q工作台，T工作台合成，F吃苹果。</p>
      <p><b>合成</b> 原木→木板(E)→木板→工作台(Q)→木棍/木镐/火把(T)</p>
    </section>
    <div class="touch-controls">
      <div class="pad">
        <button class="blank"></button><button data-key="KeyW">↑</button><button class="blank"></button>
        <button data-key="KeyA">←</button><button data-key="Space">跳</button><button data-key="KeyD">→</button>
        <button class="blank"></button><button data-key="ShiftLeft">跑</button><button class="blank"></button>
      </div>
      <div class="actions">
        <button id="touchMine">挖掘</button><button id="touchPlace">放置</button>
        <button data-key="KeyE">合成</button><button data-key="KeyF">射击</button><button data-key="KeyH">进食</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const TILE = 32;
    const WORLD_W = 190;
    const WORLD_H = 72;
    const SAVE_KEY = 'balanced-minecraft-web-save-v1';

    const BLOCKS = {
      air: { emoji: '', color: 'transparent', solid: false, hardness: 0, name: '空气' },
      grass: { emoji: '🌿', color: '#5c9f38', solid: true, hardness: 1, name: '草方块' },
      dirt: { emoji: '🟫', color: '#8a5a32', solid: true, hardness: 1, name: '泥土' },
      stone: { emoji: '⬛', color: '#787b78', solid: true, hardness: 2.4, name: '石头' },
      wood: { emoji: '🪵', color: '#8f5b2c', solid: true, hardness: 1.7, name: '原木' },
      leaves: { emoji: '🍃', color: '#3f8737', solid: true, hardness: 0.7, name: '树叶' },
      sand: { emoji: '🟨', color: '#d6bb6a', solid: true, hardness: 0.8, name: '沙子' },
      water: { emoji: '💧', color: 'rgba(64, 145, 214, 0.62)', solid: false, hardness: 0, name: '水' },
      poison_gas: { emoji: '☠️', color: 'rgba(128, 0, 128, 0.65)', solid: false, hardness: 0, name: '毒气' },
      fire: { emoji: '🔥', color: '#ff6a00', solid: false, hardness: 0, name: '火焰' },
      coal: { emoji: '◼', color: '#3c3d3d', solid: true, hardness: 3, name: '煤矿' },
      iron: { emoji: '▣', color: '#a98062', solid: true, hardness: 3.4, name: '铁矿' },
      plank: { emoji: '▤', color: '#b77a38', solid: true, hardness: 1.2, name: '木板' },
      stick: { emoji: '╋', color: '#8f5b2c', solid: false, hardness: 0, name: '木棍' },
      wood_pickaxe: { emoji: '⛏️', color: '#a07840', solid: false, hardness: 0, name: '木镐' },
      workbench: { emoji: '🟫', color: '#a07840', solid: true, hardness: 1.5, name: '工作台' },
      torch: { emoji: '🔥', color: '#f39b2e', solid: false, hardness: 0.2, name: '火把', light: 1 },
      apple: { emoji: '🍎', color: '#d84f37', solid: false, hardness: 0, name: '苹果' }
    };

    const HOTBAR = ['grass', 'dirt', 'stone', 'wood', 'coal', 'iron', 'sand', 'leaves', 'plank', 'stick', 'workbench', 'wood_pickaxe', 'apple'];
    const inventory = { grass: 4, dirt: 8, stone: 4, wood: 0, leaves: 0, sand: 0, coal: 0, iron: 0, plank: 0, stick: 0, wood_pickaxe: 0, workbench: 0, torch: 3, apple: 64 };
    let selected = 0;
    let world = [];
    let particles = [];
    let clouds = [];
    let keys = new Set();
    let mouse = { x: 0, y: 0, down: false, right: false };
    let camera = { x: 0, y: 0 };
    let spawn = { x: 10 * TILE, y: 8 * TILE };
    let time = 0.18;
    let last = performance.now();
    let mineProgress = 0;
    let mineTarget = null;
    let messageTimer = 0;
    let waterTickAccum = 0;
    let poisonTickAccum = 0;
    let mobs = [];
    let mobSpawnAccum = 0;
    let mobDmgAccum = 0;
    let boss = null;
    let bossFireballs = [];
    let fireParticles = [];
    let bossSpawnAccum = 0;
    let bees = [];
    let beeStingers = [];
    let beeSpawnAccum = 0;
    let playerBullets = [];
    let shootCooldown = 0;

    const player = {
      x: spawn.x, y: spawn.y, w: 21, h: 29, vx: 0, vy: 0,
      facing: 1, grounded: false, health: 100, hunger: 100, stamina: 100
    };

    function noise(n) {
      const x = Math.sin(n * 127.1 + 311.7) * 43758.5453;
      return x - Math.floor(x);
    }

    function smoothNoise(x) {
      const i = Math.floor(x);
      const f = x - i;
      const a = noise(i);
      const b = noise(i + 1);
      const t = f * f * (3 - 2 * f);
      return a + (b - a) * t;
    }

    function generateWorld(fresh = false) {
      world = Array.from({ length: WORLD_H }, () => Array(WORLD_W).fill('air'));
      for (let x = 0; x < WORLD_W; x++) {
        const hill = smoothNoise(x * 0.045) * 9 + smoothNoise(x * 0.12) * 4;
        const surface = Math.floor(28 + hill);
        for (let y = surface; y < WORLD_H; y++) {
          let block = 'stone';
          if (y === surface) block = x % 37 < 5 ? 'sand' : 'grass';
          else if (y < surface + 5) block = x % 37 < 5 ? 'sand' : 'dirt';
          if (y > surface + 9 && noise(x * 3.1 + y * 8.8) > 0.91) block = 'coal';
          if (y > surface + 18 && noise(x * 5.7 + y * 2.3) > 0.945) block = 'iron';
          world[y][x] = block;
        }
        if (x % 14 === 4 && x > 8 && x < WORLD_W - 8 && world[surface][x] === 'grass') {
          plantTree(x, surface - 1);
        }
        if (x % 37 < 5) {
          for (let y = surface - 1; y < Math.min(surface + 2, WORLD_H); y++) world[y][x] = 'water';
        }
      }
      spawn = { x: 9 * TILE, y: 20 * TILE };
      // 随机出生点（地图随机位置）
      const baseX = Math.floor(20 + Math.random() * (WORLD_W - 50));
      const surfaceY = world.findIndex((row) => row[baseX] !== 'air');
      if (surfaceY > 0) spawn = { x: baseX * TILE, y: (surfaceY - 2) * TILE };
      if (fresh) {
        // 随机初始物品
        inventory.grass = Math.floor(Math.random() * 6) + 4;
        inventory.dirt = Math.floor(Math.random() * 10) + 6;
        inventory.stone = Math.floor(Math.random() * 6) + 2;
        inventory.wood = Math.floor(Math.random() * 2);
        inventory.leaves = 0;
        inventory.sand = Math.floor(Math.random() * 4);
        inventory.plank = Math.floor(Math.random() * 2);
        inventory.stick = 0;
        inventory.wood_pickaxe = 0;
        inventory.workbench = 0;
        inventory.torch = Math.floor(Math.random() * 3) + 1;
        inventory.apple = Math.floor(Math.random() * 32) + 64;
      }
      resetPlayer(false);
      clouds = Array.from({ length: 12 }, (_, i) => ({ x: i * 520 + noise(i) * 180, y: 50 + noise(i + 8) * 90, s: 0.8 + noise(i + 20) * 0.8 }));
      showMessage(fresh ? '🌍 新世界已生成，随机出生点！' : '世界已重置。');
    }

    function plantTree(x, y) {
      for (let i = 0; i < 5; i++) setBlock(x, y - i, 'wood');
      for (let yy = y - 6; yy <= y - 3; yy++) {
        for (let xx = x - 2; xx <= x + 2; xx++) {
          if (Math.abs(xx - x) + Math.abs(yy - (y - 4)) < 4 && getBlock(xx, yy) === 'air') setBlock(xx, yy, 'leaves');
        }
      }
    }

    function getBlock(x, y) {
      if (x < 0 || y < 0 || x >= WORLD_W || y >= WORLD_H) return 'stone';
      return world[y][x];
    }

    function setBlock(x, y, type) {
      if (x < 0 || y < 0 || x >= WORLD_W || y >= WORLD_H) return;
      world[y][x] = type;
    }

    function mineBlock(tx, ty, dt) {
      const type = getBlock(tx, ty);
      if (type === 'air' || type === 'water' || type === 'poison_gas') return false;
      const same = mineTarget && mineTarget.x === tx && mineTarget.y === ty;
      if (!same) { mineTarget = { x: tx, y: ty }; mineProgress = 0; }
      const block = BLOCKS[type];
      const toolBonus = inventory.wood_pickaxe > 0 && ['stone', 'coal', 'iron'].includes(type) ? 1.45 : 1;
      mineProgress += dt * toolBonus * (player.stamina > 8 ? 1 : 0.55);
      player.stamina = Math.max(0, player.stamina - dt * 2.3);
      if (mineProgress >= block.hardness) {
        setBlock(tx, ty, 'air');
        inventory[type] = (inventory[type] || 0) + 1;
        if (type === 'leaves' && Math.random() < 0.34) inventory.apple++;
        burst(tx * TILE + TILE / 2, ty * TILE + TILE / 2, block.color);
        let msg = `获得 ${block.name}`;
        if (type === 'coal') msg = '获得 煤矿 ×' + (inventory.coal || 0);
        if (type === 'iron') msg = '获得 铁矿 ×' + (inventory.iron || 0);
        showMessage(msg);
        mineProgress = 0;
        mineTarget = null;
        return true;
      }
      return false;
    }

    function placeBlock(tx, ty) {
      const type = HOTBAR[selected];
      if (type === 'apple') return eatApple();
      if ((inventory[type] || 0) <= 0 || getBlock(tx, ty) !== 'air') return false;
      const px = player.x + player.w / 2;
      const py = player.y + player.h / 2;
      if (Math.abs(tx * TILE + TILE / 2 - px) > TILE * 5 || Math.abs(ty * TILE + TILE / 2 - py) > TILE * 4) return false;
      const rect = { x: tx * TILE, y: ty * TILE, w: TILE, h: TILE };
      if (overlaps(player, rect)) return false;
      setBlock(tx, ty, type);
      inventory[type]--;
      showMessage(`放置 ${BLOCKS[type].name}`);
      return true;
    }

    // 工作台放置（右键点击放置模式+手持工作台）
    function placeWorkbench() {
      const t = targetFromPointer();
      const type = HOTBAR[selected];
      if (getBlock(t.x, t.y) !== 'air') return false;
      if (type !== 'workbench') return false;
      if (inventory.workbench <= 0) return false;
      inventory.workbench--;
      setBlock(t.x, t.y, 'workbench');
      showMessage('放置工作台！站在附近按 E 使用。');
      return true;
    }

    // 合成系统 - 全部需要工作台
    function getNearbyWorkbench() {
      const px = Math.floor(player.x / TILE);
      const py = Math.floor(player.y / TILE);
      for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          if (getBlock(px + dx, py + dy) === 'workbench') return true;
        }
      }
      return false;
    }

    // 合成工作台（不需要工作台就能合成）
    function craftWorkbench() {
      if (inventory.plank < 4) {
        showMessage('需要4个木板才能合成工作台（当前：' + inventory.plank + '个）');
        return false;
      }
      inventory.plank -= 4;
      inventory.workbench++;
      showMessage('合成工作台！右键放置到地上再使用。');
      return true;
    }

    // 工作台高级合成（必须在工作台2格内）
    function craftAtWorkbench() {
      if (!getNearbyWorkbench()) {
        showMessage('附近没有工作台（站在工作台2格内）');
        return false;
      }
      // 合成木棍：2木板 → 4木棍
      if (inventory.plank >= 2) {
        inventory.plank -= 2;
        inventory.stick += 4;
        showMessage('工作台：2木板 → 4木棍 ✓');
        return true;
      }
      // 合成木镐：3木板 + 2木棍
      if (inventory.plank >= 3 && inventory.stick >= 2) {
        inventory.plank -= 3;
        inventory.stick -= 2;
        inventory.wood_pickaxe++;
        showMessage('工作台：3木板+2木棍 → 木镐 ✓');
        return true;
      }
      // 合成火把：1煤矿+1木棍 → 4火把
      if (inventory.coal >= 1 && inventory.stick >= 1) {
        inventory.coal -= 1;
        inventory.stick -= 1;
        inventory.torch += 4;
        showMessage('工作台：1煤矿+1木棍 → 4火把 ✓');
        return true;
      }
      showMessage('工作台合成：需要木板或煤矿+木棍。');
      return false;
    }

    // 徒手合成（不需要工作台）
    function craftPlanks() {
      if (inventory.wood <= 0) {
        showMessage('需要原木才能合成木板。');
        return false;
      }
      inventory.wood--;
      inventory.plank += 4;
      showMessage('1 原木 → 4 木板（徒手合成）');
      return true;
    }

    function eatApple() {
      if (inventory.apple <= 0) return false;
      inventory.apple--;
      player.hunger = Math.min(100, player.hunger + 24);
      player.health = Math.min(100, player.health + 8);
      showMessage('苹果恢复饥饿和生命。');
      return true;
    }

    function saveGame() {
      saveState();
      showMessage('已保存世界。');
    }

    function saveState() {
      localStorage.setItem(SAVE_KEY, JSON.stringify({ world, inventory, player: { x: player.x, y: player.y, health: player.health, hunger: player.hunger }, time, mobs, boss, bees, fireParticles, playerBullets, beeStingers }));
    }

    function loadState(data) {
      world = data.world;
      Object.assign(inventory, data.inventory);
      Object.assign(player, data.player, { vx: 0, vy: 0 });
      time = data.time || 0.2;
      mobs = data.mobs || [];
      boss = data.boss || null;
      bees = data.bees || [];
      fireParticles = data.fireParticles || [];
      playerBullets = data.playerBullets || [];
      beeStingers = data.beeStingers || [];
    }

    function loadGame() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) { showMessage('没有存档。'); return false; }
      const data = JSON.parse(raw);
      loadState(data);
      showMessage('已读取存档。');
      return true;
    }

    function resetPlayer(full = true) {
      player.x = spawn.x;
      player.y = spawn.y;
      player.vx = 0;
      player.vy = 0;
      player.health = full ? 100 : player.health;
      player.hunger = full ? 100 : player.hunger;
      player.stamina = 100;
      showMessage('已在出生点重生。');
    }

    function burst(x, y, color) {
      for (let i = 0; i < 12; i++) {
        particles.push({ x, y, vx: (Math.random() - 0.5) * 160, vy: (Math.random() - 0.8) * 150, life: 0.45 + Math.random() * 0.4, color });
      }
    }

    function overlaps(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function isSolidAtPixel(px, py) {
      const type = getBlock(Math.floor(px / TILE), Math.floor(py / TILE));
      return BLOCKS[type].solid;
    }

    function moveAndCollide(dt) {
      player.grounded = false;
      player.x += player.vx * dt;
      collideAxis('x');
      player.y += player.vy * dt;
      collideAxis('y');
    }

    function collideAxis(axis) {
      const left = Math.floor(player.x / TILE);
      const right = Math.floor((player.x + player.w) / TILE);
      const top = Math.floor(player.y / TILE);
      const bottom = Math.floor((player.y + player.h) / TILE);
      for (let y = top; y <= bottom; y++) {
        for (let x = left; x <= right; x++) {
          const type = getBlock(x, y);
          if (!BLOCKS[type].solid) continue;
          const b = { x: x * TILE, y: y * TILE, w: TILE, h: TILE };
          if (!overlaps(player, b)) continue;
          if (axis === 'x') {
            if (player.vx > 0) player.x = b.x - player.w;
            if (player.vx < 0) player.x = b.x + b.w;
            player.vx = 0;
          } else {
            if (player.vy > 0) { player.y = b.y - player.h; player.grounded = true; }
            if (player.vy < 0) player.y = b.y + b.h;
            player.vy = 0;
          }
        }
      }
    }

    function update(dt) {
      time = (time + dt / 240) % 1;
      const sprinting = keys.has('ShiftLeft') && player.stamina > 3 && player.hunger > 8;
      const speed = sprinting ? 205 : 145;
      let dir = 0;
      if (keys.has('KeyA')) dir--;
      if (keys.has('KeyD')) dir++;
      player.vx += (dir * speed - player.vx) * Math.min(1, dt * 13);
      if (dir) player.facing = dir;
      if ((keys.has('KeyW') || keys.has('Space')) && player.grounded && player.stamina > 4) {
        player.vy = -405;
        player.stamina -= 5;
      }
      player.vy += 940 * dt;
      player.vy = Math.min(player.vy, 640);
      moveAndCollide(dt);
      const inWater = getBlock(Math.floor((player.x + player.w / 2) / TILE), Math.floor((player.y + player.h) / TILE)) === 'water';
      if (inWater) { player.vy -= 520 * dt; player.vx *= 0.92; }
      player.hunger = Math.max(0, player.hunger - dt * (sprinting ? 1.35 : 0.36));
      if (!sprinting && player.stamina < 100) player.stamina = Math.min(100, player.stamina + dt * 12);
      if (player.hunger <= 0) player.health = Math.max(0, player.health - dt * 3.5);
      if (player.hunger > 70 && player.health < 100) player.health = Math.min(100, player.health + dt * 1.2);
      if (player.y > WORLD_H * TILE + 200 || player.health <= 0) resetPlayer(true);
      if (mouse.down) mineAtPointer(dt);
      particles = particles.filter(p => {
        p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 260 * dt; return p.life > 0;
      });
      for (const c of clouds) c.x = (c.x + dt * 10 * c.s) % (WORLD_W * TILE + 600);
      // 水流下落
      waterTickAccum += dt;
      if (waterTickAccum >= 0.25) {
        waterTickAccum = 0;
        const newWorld = world.map(r => [...r]);
        for (let y = WORLD_H - 2; y >= 0; y--) {
          for (let x = 0; x < WORLD_W; x++) {
            if (world[y][x] === 'water' && newWorld[y + 1][x] === 'air') {
              newWorld[y + 1][x] = 'water';
              newWorld[y][x] = 'air';
            }
          }
        }
        world = newWorld;
      }
      // 毒气生成与蔓延（每10秒）
      poisonTickAccum = (poisonTickAccum || 0) + dt;
      if (poisonTickAccum >= 10) {
        poisonTickAccum = 0;
        const px = Math.floor(player.x / TILE);
        const py = Math.floor(player.y / TILE);
        // 地下判定：头顶有5格以上实心方块即为深处
        let solidAbove = 0;
        for (let i = 1; i <= 10; i++) {
          if (py - i < 0) break;
          const b = px >= 0 && px < WORLD_W ? world[py - i][px] : 'air';
          if (b !== 'air' && b !== 'water' && b !== 'poison_gas') solidAbove++;
        }
        if (solidAbove >= 5 && py > 5) {
          const spotX = Math.max(0, Math.min(WORLD_W - 1, px + Math.floor(Math.random() * 7) - 3));
          const spotY = Math.max(0, Math.min(WORLD_H - 1, py + Math.floor(Math.random() * 3)));
          if (world[spotY][spotX] === 'air') {
            world[spotY][spotX] = 'poison_gas';
          }
        }
        // 毒气蔓延
        const newWorld2 = world.map(r => [...r]);
        for (let y = 0; y < WORLD_H; y++) {
          for (let x = 0; x < WORLD_W; x++) {
            if (world[y][x] === 'poison_gas' && Math.random() < 0.3) {
              const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
              const [dx, dy] = dirs[Math.floor(Math.random() * dirs.length)];
              const nx = x + dx, ny = y + dy;
              if (nx >= 0 && nx < WORLD_W && ny >= 0 && ny < WORLD_H && newWorld2[ny][nx] === 'air') {
                newWorld2[ny][nx] = 'poison_gas';
              }
            }
          }
        }
        world = newWorld2;
        // 玩家接触毒气扣血
        const pbx = Math.floor(player.x / TILE);
        const pby = Math.floor(player.y / TILE);
        for (let dy = 0; dy <= 1; dy++) {
          for (let dx = 0; dx <= 1; dx++) {
            const x = pbx + dx;
            const y = pby + dy;
            if (x >= 0 && x < WORLD_W && y >= 0 && y < WORLD_H && world[y][x] === 'poison_gas') {
              player.health = Math.max(0, player.health - 0.8);
              if (Math.random() < 0.03) showMessage('☠️ 毒气侵蚀！');
              break;
            }
          }
        }
      }
      // 怪物生成（每15秒在地下深处生成一只）
      mobSpawnAccum += dt;
      if (mobSpawnAccum >= 15 && mobs.length < 8) {
        mobSpawnAccum = 0;
        const px = Math.floor(player.x / TILE);
        const py = Math.floor(player.y / TILE);
        let solidAbove = 0;
        for (let i = 1; i <= 10; i++) {
          if (py - i < 0) break;
          const b = px >= 0 && px < WORLD_W ? world[py - i][px] : 'air';
          if (b !== 'air' && b !== 'water' && b !== 'poison_gas') solidAbove++;
        }
        if (solidAbove >= 5) {
          const sx = Math.max(1, Math.min(WORLD_W - 2, px + Math.floor(Math.random() * 11) - 5));
          const sy = Math.max(1, Math.min(WORLD_H - 2, py + Math.floor(Math.random() * 5) - 2));
          if (world[sy][sx] === 'air') {
            mobs.push({ x: sx * TILE, y: sy * TILE, w: 22, h: 26, vx: 0, vy: 0, hp: 30, type: Math.random() < 0.5 ? 'zombie' : 'skeleton' });
            showMessage('⚠️ 怪物出现！');
          }
        }
      }
      // 怪物移动与碰撞扣血
      mobDmgAccum += dt;
      for (let i = mobs.length - 1; i >= 0; i--) {
        const m = mobs[i];
        // 移向玩家（只在地下移向玩家）
        const dx = player.x - m.x;
        const speed = 72;
        m.vx += Math.sign(dx) * speed * dt * 4;
        m.vx *= 0.85;
        m.x += m.vx * dt;
        // 重力（一直有）
        m.vy += 600 * dt;
        m.vy = Math.min(m.vy, 400);
        m.y += m.vy * dt;
        // 碰撞地面 - 检查脚下是否solid
        const my2 = Math.floor((m.y + m.h) / TILE);
        const mx = Math.floor((m.x + m.w / 2) / TILE);
        const groundType = (my2 >= 0 && my2 < WORLD_H && mx >= 0 && mx < WORLD_W) ? world[my2][mx] : 'air';
        if (groundType !== 'air' && groundType !== 'water' && groundType !== 'poison_gas' && groundType !== 'fire') {
          m.y = my2 * TILE - m.h;
          m.vy = 0;
        }
        // 超出地下范围则删除
        const mby = Math.floor((m.y + m.h / 2) / TILE);
        if (mby < 10) { mobs.splice(i, 1); continue; }
        // 碰到玩家扣血
        if (mobDmgAccum >= 1) {
          if (Math.abs(m.x - player.x) < (m.w + player.w) * 0.6 && Math.abs(m.y - player.y) < (m.h + player.h) * 0.6) {
            player.health = Math.max(0, player.health - 5);
            if (Math.random() < 0.1) showMessage('👊 受到攻击！');
          }
        }
      }
      if (mobDmgAccum >= 1) mobDmgAccum = 0;
      // 大黄蜂生成（每10秒从天上出现）
      beeSpawnAccum += dt;
      if (beeSpawnAccum >= 10 && bees.length < 20) {
        beeSpawnAccum = 0;
        const px = Math.floor(player.x / TILE);
        const py = Math.floor(player.y / TILE);
        // 出现在玩家上方10-20格的天空
        const bx = Math.max(1, Math.min(WORLD_W - 2, px + Math.floor(Math.random() * 9) - 4);
        const by = Math.max(1, Math.min(Math.floor(WORLD_H / 2), py - 10 - Math.floor(Math.random() * 10)));
        bees.push({ x: bx * TILE, y: by * TILE, w: 24, h: 20, vx: 0, vy: 0, hp: 10, shootTimer: Math.random() * 2, moveTimer: 0, targetX: 0, targetY: 0, baseY: by * TILE });
        if (bees.length === 1) showMessage('🐝 大黄蜂来袭！');
      }
      // 大黄蜂行为
      for (let i = bees.length - 1; i >= 0; i--) {
        const b = bees[i];
        b.moveTimer -= dt;
        if (b.moveTimer <= 0) {
          b.moveTimer = 1 + Math.random() * 2;
          const playerTy = Math.floor(player.y / TILE);
          const beeMinY = Math.max(1, playerTy - 10 - Math.floor(Math.random() * 10));
          const beeMaxY = Math.max(beeMinY + 1, playerTy - 10);
          const beeY = Math.max(1, Math.min(Math.floor(WORLD_H / 2), beeMinY + Math.floor(Math.random() * (beeMaxY - beeMinY + 1));
          const beeX = Math.max(1, Math.min(WORLD_W - 2, Math.floor(player.x / TILE) + Math.floor(Math.random() * 9) - 4);
          b.targetX = beeX * TILE;
          b.targetY = beeY * TILE;
        }
        const ddx = b.targetX - b.x;
        const ddy = b.targetY - b.y;
        b.vx += ddx * 0.5;
        b.vy += ddy * 0.5;
        b.vx *= 0.92;
        b.vy *= 0.92;
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        // 发射毒针
        b.shootTimer -= dt;
        if (b.shootTimer <= 0) {
          b.shootTimer = 1.8 + Math.random();
          const dx = player.x - b.x;
          const dy = player.y - b.y;
          const len = Math.max(1, Math.hypot(dx, dy));
          beeStingers.push({ x: b.x + b.w / 2, y: b.y + b.h / 2, vx: dx / len * 180, vy: dy / len * 180, life: 3 });
        }
        // 蜜蜂被击杀
        if (b.hp <= 0) { bees.splice(i, 1); showMessage('🐝 消灭大黄蜂！'); }
      }
      // 毒针移动与命中
      for (let i = beeStingers.length - 1; i >= 0; i--) {
        const s = beeStingers[i];
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.life -= dt;
        // 命中玩家（用格子坐标比较）
        const sjx = Math.floor(s.x / TILE), sjy = Math.floor(s.y / TILE);
        const pjx = Math.floor((player.x + player.w / 2) / TILE), pjy = Math.floor((player.y + player.h / 2) / TILE);
        if (Math.abs(sjx - pjx) <= 1 && Math.abs(sjy - pjy) <= 1) {
          player.health = Math.max(0, player.health - 3);
          if (Math.random() < 0.1) showMessage('💉 被毒针刺中！');
          beeStingers.splice(i, 1);
          continue;
        }
        // 越界或生命结束消失
        if (s.life <= 0 || s.x < 0 || s.x >= WORLD_W * TILE || s.y < 0 || s.y >= WORLD_H * TILE) { beeStingers.splice(i, 1); }
      }
      // 玩家射击冷却
      shootCooldown = Math.max(0, shootCooldown - dt);
      // 玩家子弹移动
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;
        const bx = Math.floor(b.x / TILE);
        const by = Math.floor(b.y / TILE);
        // 撞到边界或实心方块消失
        if (b.life <= 0 || bx < 0 || bx >= WORLD_W || by < 0 || by >= WORLD_H) {
          playerBullets.splice(i, 1);
          continue;
        }
        const worldType = world[by] ? (world[by][bx] || 'air') : 'air';
        if (!['air', 'water', 'poison_gas', 'fire'].includes(worldType)) {
          playerBullets.splice(i, 1);
          continue;
        }
        // 击中大黄蜂
        for (let j = bees.length - 1; j >= 0; j--) {
          const bee = bees[j];
          if (b.x > bee.x && b.x < bee.x + bee.w && b.y > bee.y && b.y < bee.y + bee.h) {
            bee.hp -= b.dmg;
            playerBullets.splice(i, 1);
            if (bee.hp <= 0) { bees.splice(j, 1); showMessage('🐝 消灭大黄蜂！'); }
            break;
          }
        }
        // 击中普通怪物
        for (let j = mobs.length - 1; j >= 0; j--) {
          const m = mobs[j];
          if (b.x > m.x && b.x < m.x + m.w && b.y > m.y && b.y < m.y + m.h) {
            m.hp -= b.dmg;
            playerBullets.splice(i, 1);
            if (m.hp <= 0) { mobs.splice(j, 1); showMessage('☠️ 击杀怪物！'); }
            break;
          }
        }
        // 击中Boss
        if (boss && b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h && boss.invincible <= 0) {
          boss.hp -= b.dmg;
          boss.invincible = 0.2;
          playerBullets.splice(i, 1);
          if (boss.hp <= 0) { boss = null; showMessage('🏆 BOSS击杀！'); }
        }
      }
      // Boss生成（立即出现，自己在地下随机活动）
      if (!boss) {
        const bx = Math.floor(1 + Math.random() * (WORLD_W - 2));
        const by = Math.floor(Math.floor(WORLD_H * 0.5) + Math.random() * (WORLD_H - Math.floor(WORLD_H * 0.5) - 1));
        boss = { x: bx * TILE, y: by * TILE, w: 36, h: 40, vx: 0, vy: 0, hp: 300, fireAccum: 0, fireDir: 0, invincible: 0, wanderTimer: 0, wanderTarget: { x: bx * TILE, y: by * TILE }, chasing: false };
        showMessage('💀 BOSS出现！');
      }
      // Boss行为
      if (boss) {
        boss.invincible = Math.max(0, boss.invincible - dt);
        const dx = player.x - boss.x;
        const dy = player.y - boss.y;
        const dist = Math.hypot(dx, dy);
        const playerUnderground = Math.floor(player.y / TILE) > 30;
        // 玩家在地下且距离<20格则追击，否则原地随机活动
        if (playerUnderground && dist < TILE * 20) {
          boss.chasing = true;
          boss.wanderTimer = 3;
        } else {
          boss.chasing = false;
        }
        if (boss.chasing) {
          // 追击玩家
          if (dist > 80) {
            boss.vx += Math.sign(dx) * 220 * dt;
            boss.vx *= 0.88;
            boss.x += boss.vx * dt;
          }
        } else {
          // 原地随机活动（每1-3秒换个方向）
          boss.wanderTimer -= dt;
          if (boss.wanderTimer <= 0) {
            boss.wanderTimer = 1 + Math.random() * 3;
            const rx = Math.floor(1 + Math.random() * (WORLD_W - 2));
            const ry = Math.floor(Math.floor(WORLD_H * 0.45) + Math.random() * (WORLD_H - Math.floor(WORLD_H * 0.45) - 1));
            boss.wanderTarget = { x: rx * TILE, y: ry * TILE };
          }
          const wdx = boss.wanderTarget.x - boss.x;
          const wdy = boss.wanderTarget.y - boss.y;
          boss.vx += Math.sign(wdx) * 80 * dt;
          boss.vy += Math.sign(wdy) * 80 * dt;
          boss.vx *= 0.85;
          boss.vy *= 0.85;
          boss.x += boss.vx * dt;
        }
        // 重力
        boss.vy += 600 * dt;
        boss.vy = Math.min(boss.vy, 400);
        boss.y += boss.vy * dt;
        // 四周碰撞
        const bmy1 = Math.floor(boss.y / TILE);
        const bmy2 = Math.floor((boss.y + boss.h) / TILE);
        const bmx1 = Math.floor((boss.x + 6) / TILE);
        const bmx2 = Math.floor((boss.x + boss.w - 6) / TILE);
        const ground = (by) => world[by] && world[by][bmx1] && !['air','water','poison_gas','fire'].includes(world[by][bmx1]);
        const ceilBlk = (by) => world[by] && world[by][bmx1] && !['air','water','poison_gas','fire'].includes(world[by][bmx1]);
        const leftBlk = (bx) => world[bmy2] && world[bmy2][bx] && !['air','water','poison_gas','fire'].includes(world[bmy2][bx]);
        const rightBlk = (bx) => world[bmy2] && world[bmy2][bx] && !['air','water','poison_gas','fire'].includes(world[bmy2][bx]);
        // 地面
        if (bmy2 >= 0 && bmy2 < WORLD_H && bmx1 >= 0 && bmx1 < WORLD_W && ground(bmy2)) {
          boss.y = bmy2 * TILE - boss.h; boss.vy = 0;
        }
        // 天花板
        if (bmy1 >= 0 && bmy1 < WORLD_H && bmx1 >= 0 && bmx1 < WORLD_W && ceilBlk(bmy1)) {
          boss.y = (bmy1 + 1) * TILE; boss.vy = Math.max(0, boss.vy);
        }
        // 左墙
        if (bmx1 >= 0 && bmx1 < WORLD_W && bmy2 >= 0 && bmy2 < WORLD_H && leftBlk(bmx1)) {
          boss.x = (bmx1 + 1) * TILE - 6; boss.vx = 0;
        }
        // 右墙
        if (bmx2 >= 0 && bmx2 < WORLD_W && bmy2 >= 0 && bmy2 < WORLD_H && rightBlk(bmx2)) {
          boss.x = bmx2 * TILE - boss.w + 6; boss.vx = 0;
        }
        boss.x = Math.max(0, Math.min(WORLD_W * TILE - boss.w, boss.x));
        // 喷火（持续5秒，每0.25秒喷射一次，共20格）
        boss.fireAccum += dt;
        if (boss.fireAccum >= 2.5 && !boss.fireBreathing) {
          boss.fireBreathing = true;
          boss.fireTimer = 5;
          boss.fireDir = dx > 0 ? 1 : -1;
          showMessage('🔥 BOSS开始喷火！');
        }
        if (boss.fireBreathing) {
          boss.fireTimer -= dt;
          if (boss.fireTimer <= 0) {
            boss.fireBreathing = false;
            boss.fireAccum = 0;
          } else {
            const bx = Math.floor((boss.x + boss.w / 2) / TILE);
            const by = Math.floor((boss.y + boss.h / 2) / TILE);
            const dir = boss.fireDir;
            // 每0.25秒沿水平方向喷射一格火焰
            if (Math.floor(boss.fireTimer * 4) !== Math.floor((boss.fireTimer + dt) * 4)) {
              for (let i = 1; i <= 20; i++) {
                const fx = bx + dir * i;
                const fy = by + Math.floor(Math.random() * 3) - 1;
                if (fx < 0 || fx >= WORLD_W || fy < 0 || fy >= WORLD_H) break;
                const bt = world[fy][fx];
                if (bt === 'poison_gas') {
                  // 毒气爆炸：周围3格全部清除
                  world[fy][fx] = 'air';
                  for (let dy = -3; dy <= 3; dy++) {
                    for (let dx2 = -3; dx2 <= 3; dx2++) {
                      if (dx2 * dx2 + dy * dy > 9) continue;
                      const ex = fx + dx2, ey = fy + dy;
                      if (ex >= 0 && ex < WORLD_W && ey >= 0 && ey < WORLD_H && world[ey][ex] !== 'air') {
                        world[ey][ex] = 'air';
                      }
                    }
                  }
                  // 爆炸粒子
                  for (let k = 0; k < 20; k++) {
                    const angle = Math.random() * Math.PI * 2;
                    const spd = 50 + Math.random() * 150;
                    fireParticles.push({ x: fx * TILE + TILE / 2, y: fy * TILE + TILE / 2, life: 0.8, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 50, color: '#88ff44' });
                  }
                  showMessage('💥 火焰引爆毒气！');
                  break;
                }
                if (bt !== 'air' && bt !== 'fire' && bt !== 'water') {
                  world[fy][fx] = 'air';
                  break;
                }
              }
              // 火焰粒子
              for (let i = 1; i <= 20; i++) {
                const px = (bx + dir * i) * TILE + TILE / 2;
                const py = by * TILE + TILE / 2;
                fireParticles.push({ x: px, y: py, life: 0.6 + Math.random() * 0.4, vx: dir * (100 + Math.random() * 50) + (Math.random() - 0.5) * 40, vy: (Math.random() - 0.5) * 80, color: '#ff6600' });
              }
            }
          }
        }
        // Boss接触玩家扣血
        if (mobDmgAccum >= 1) {
          if (Math.abs(boss.x - player.x) < (boss.w + player.w) * 0.55 && Math.abs(boss.y - player.y) < (boss.h + player.h) * 0.55) {
            player.health = Math.max(0, player.health - 8);
            if (Math.random() < 0.15) showMessage('💀 BOSS攻击！');
          }
        }
        // Boss被击杀
        if (boss.hp <= 0) {
          showMessage('🏆 BOSS击杀！');
          boss = null;
        }
      }
      // 火焰粒子更新
      for (let i = fireParticles.length - 1; i >= 0; i--) {
        const p = fireParticles[i];
        p.vx ||= 0;
        p.vy ||= 0;
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 30 * dt;
        if (p.life <= 0) fireParticles.splice(i, 1);
      }
      // 玩家接触火焰扣血
      if (mobDmgAccum >= 1) {
        const pbx = Math.floor(player.x / TILE);
        const pby = Math.floor(player.y / TILE);
        for (let dy = 0; dy <= 1; dy++) {
          for (let dx = 0; dx <= 1; dx++) {
            const x = pbx + dx;
            const y = pby + dy;
            if (x >= 0 && x < WORLD_W && y >= 0 && y < WORLD_H && (world[y][x] === 'fire' || fireParticles.some(f => Math.abs(f.x - player.x) < 30 && Math.abs(f.y - player.y) < 30))) {
              player.health = Math.max(0, player.health - 3);
              break;
            }
          }
        }
      }
      updateCamera();
      updateHud();
    }

    function targetFromPointer() {
      const cx = mouse.x + camera.x;
      const cy = mouse.y + camera.y;
      const playerCx = player.x + player.w / 2;
      const playerCy = player.y + player.h / 2;
      const dx = cx - playerCx;
      const dy = cy - playerCy;
      const len = Math.max(1, Math.hypot(dx, dy));
      const reach = Math.min(len, TILE * 5.1);
      return { x: Math.floor((playerCx + dx / len * reach) / TILE), y: Math.floor((playerCy + dy / len * reach) / TILE) };
    }

    function mineAtPointer(dt) {
      const t = targetFromPointer();
      mineBlock(t.x, t.y, dt);
    }

    function updateCamera() {
      camera.x += (player.x + player.w / 2 - canvas.width / 2 - camera.x) * 0.08;
      camera.y += (player.y + player.h / 2 - canvas.height / 2 - camera.y) * 0.08;
      camera.x = Math.max(0, Math.min(WORLD_W * TILE - canvas.width, camera.x));
      camera.y = Math.max(0, Math.min(WORLD_H * TILE - canvas.height, camera.y));
    }

    function draw() {
      const day = Math.sin(time * Math.PI * 2) * 0.5 + 0.5;
      const skyTop = lerpColor([16, 22, 42], [86, 168, 226], day);
      const skyBottom = lerpColor([41, 35, 58], [212, 232, 198], day);
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, `rgb(${skyTop.join(',')})`);
      grad.addColorStop(1, `rgb(${skyBottom.join(',')})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawSunMoon(day);
      drawClouds();
      ctx.save();
      ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));
      drawWorld(day);
      drawBoss(day);
      drawMobs(day);
      drawBees(day);
      drawBullets();
      drawParticles();
      drawPlayer();
      drawTarget();
      ctx.restore();
      if (day < 0.25) {
        ctx.fillStyle = `rgba(4, 8, 24, ${0.38 - day})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawSunMoon(day) {
      const angle = time * Math.PI * 2;
      const x = canvas.width * (0.5 + Math.cos(angle - Math.PI) * 0.42);
      const y = canvas.height * (0.55 + Math.sin(angle - Math.PI) * 0.5);
      ctx.fillStyle = day > 0.35 ? '#ffe08a' : '#dce8ff';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 35;
      ctx.beginPath();
      ctx.arc(x, y, day > 0.35 ? 34 : 24, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawClouds() {
      ctx.fillStyle = 'rgba(255, 246, 220, 0.72)';
      for (const c of clouds) {
        const x = c.x - camera.x * 0.22 - 260;
        const y = c.y - camera.y * 0.05;
        ctx.fillRect(x, y, 120 * c.s, 22 * c.s);
        ctx.fillRect(x + 30 * c.s, y - 16 * c.s, 80 * c.s, 26 * c.s);
        ctx.fillRect(x + 82 * c.s, y + 10 * c.s, 70 * c.s, 18 * c.s);
      }
    }

    function drawWorld(day) {
      const startX = Math.max(0, Math.floor(camera.x / TILE) - 1);
      const endX = Math.min(WORLD_W, Math.ceil((camera.x + canvas.width) / TILE) + 1);
      const startY = Math.max(0, Math.floor(camera.y / TILE) - 1);
      const endY = Math.min(WORLD_H, Math.ceil((camera.y + canvas.height) / TILE) + 1);
      for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
          const type = getBlock(x, y);
          if (type === 'air') continue;
          const b = BLOCKS[type];
          const px = x * TILE, py = y * TILE;
          ctx.fillStyle = shade(b.color, y, day, type);
          ctx.fillRect(px, py, TILE, TILE);
          if (type !== 'water') {
            ctx.fillStyle = 'rgba(255,255,255,0.10)';
            ctx.fillRect(px, py, TILE, 3);
            ctx.fillStyle = 'rgba(0,0,0,0.18)';
            ctx.fillRect(px, py + TILE - 4, TILE, 4);
            ctx.strokeStyle = 'rgba(0,0,0,0.22)';
            ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
          } else {
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.fillRect(px, py + 6 + Math.sin(time * 18 + x) * 2, TILE, 3);
          }
          if (b.emoji && ['coal', 'iron', 'torch'].includes(type)) {
            ctx.font = '20px serif';
            ctx.fillText(b.emoji, px + 6, py + 23);
          }
        }
      }
    }

    function drawBees(day) {
      // 毒针
      ctx.fillStyle = '#88ff44';
      for (const s of beeStingers) {
        const sx = s.x - camera.x;
        const sy = s.y - camera.y;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(Math.atan2(s.vy, s.vx));
        ctx.fillRect(-8, -2, 16, 4);
        ctx.fillStyle = '#44cc22';
        ctx.beginPath();
        ctx.moveTo(8, 0);
        ctx.lineTo(14, -3);
        ctx.lineTo(14, 3);
        ctx.fill();
        ctx.restore();
      }
      // 大黄蜂
      for (const b of bees) {
        const sx = b.x - camera.x;
        const sy = b.y - camera.y;
        if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) continue;
        ctx.save();
        ctx.translate(sx + b.w / 2, sy + b.h / 2);
        const facing = b.vx >= 0 ? 1 : -1;
        if (facing < 0) ctx.scale(-1, 1);
        // 翅膀
        ctx.fillStyle = 'rgba(200,230,255,0.5)';
        ctx.fillRect(-10, -14, 8, 8);
        ctx.fillRect(2, -14, 8, 8);
        // 身体
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(-10, -6, 20, 14);
        // 条纹
        ctx.fillStyle = '#111';
        ctx.fillRect(-8, -4, 5, 10);
        ctx.fillRect(3, -4, 5, 10);
        // 头
        ctx.fillStyle = '#aa8800';
        ctx.beginPath();
        ctx.arc(10, 0, 6, 0, Math.PI * 2);
        ctx.fill();
        // 眼
        ctx.fillStyle = '#000';
        ctx.fillRect(12, -2, 3, 3);
        // 毒针
        ctx.fillStyle = '#44cc22';
        ctx.fillRect(-14, -1, 6, 2);
        ctx.restore();
      }
    }

    function hexToRgba(hex, alpha) {
      const h = hex.replace('#', '');
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function drawBoss(day) {
      if (!boss) return;
      const sx = boss.x - camera.x;
      const sy = boss.y - camera.y;
      if (sx < -100 || sx > canvas.width + 100 || sy < -100 || sy > canvas.height + 100) return;
      ctx.save();
      // 身体
      ctx.fillStyle = '#8b0000';
      ctx.fillRect(sx, sy + 8, boss.w, boss.h - 8);
      // 头
      ctx.fillStyle = '#cc1111';
      ctx.fillRect(sx + 4, sy, boss.w - 8, 18);
      // 角
      ctx.fillStyle = '#333';
      ctx.fillRect(sx + 4, sy - 8, 6, 10);
      ctx.fillRect(sx + boss.w - 10, sy - 8, 6, 10);
      // 眼睛
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(sx + 10, sy + 6, 6, 6);
      ctx.fillRect(sx + boss.w - 16, sy + 6, 6, 6);
      // 血条背景
      ctx.fillStyle = '#333';
      ctx.fillRect(sx - 2, sy - 18, boss.w + 4, 8);
      // 血条
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(sx, sy - 16, boss.w * (boss.hp / 300), 4);
      ctx.restore();
      // 火焰粒子
      for (const f of fireParticles) {
        const fsx = f.x - camera.x;
        const fsy = f.y - camera.y;
        if (f.color) {
          ctx.fillStyle = f.color.startsWith('#') ? hexToRgba(f.color, f.life) : f.color;
        } else {
          ctx.fillStyle = `rgba(255,${Math.floor(100 + Math.random() * 100)},0,${f.life})`;
        }
        ctx.beginPath();
        ctx.arc(fsx, fsy, 4 + f.life * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawMobs(day) {
      for (const m of mobs) {
        const sx = m.x - camera.x;
        const sy = m.y - camera.y;
        if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) continue;
        const facing = m.vx >= 0 ? 1 : -1;
        ctx.save();
        ctx.translate(sx + m.w / 2, sy + m.h / 2);
        if (facing < 0) ctx.scale(-1, 1);
        ctx.fillStyle = m.type === 'zombie' ? '#2d5a1e' : '#8a7a6a';
        ctx.fillRect(-m.w / 2, -m.h / 2 + 4, m.w, m.h - 4);
        ctx.fillStyle = m.type === 'zombie' ? '#4a7a30' : '#c4a882';
        ctx.fillRect(-m.w / 2 + 3, -m.h / 2, m.w - 6, 12);
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(-4, -m.h / 2 + 3, 3, 3);
        ctx.fillRect(1, -m.h / 2 + 3, 3, 3);
        ctx.fillStyle = '#333';
        ctx.fillRect(-m.w / 2 + 2, m.h / 2 - 6, 8, 6);
        ctx.fillRect(m.w / 2 - 10, m.h / 2 - 6, 8, 6);
        ctx.restore();
      }
    }

    function drawPlayer() {
      const x = player.x, y = player.y;
      ctx.fillStyle = '#2f7dbe';
      ctx.fillRect(x + 3, y + 12, 15, 17);
      ctx.fillStyle = '#c98856';
      ctx.fillRect(x + 2, y + 2, 17, 13);
      ctx.fillStyle = '#2a4e9f';
      ctx.fillRect(x + 3, y + 24, 6, 9);
      ctx.fillRect(x + 12, y + 24, 6, 9);
      ctx.fillStyle = '#2b1a11';
      ctx.fillRect(x + (player.facing > 0 ? 13 : 4), y + 7, 3, 3);
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.strokeRect(x + 1.5, y + 1.5, 18, 31);
    }

    function drawBullets() {
      for (const b of playerBullets) {
        const sx = b.x - camera.x;
        const sy = b.y - camera.y;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(Math.atan2(b.vy, b.vx));
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 8;
        ctx.fillRect(-10, -3, 20, 6);
        ctx.fillStyle = '#fff';
        ctx.fillRect(-6, -1, 8, 2);
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life * 1.6);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 5, 5);
      }
      ctx.globalAlpha = 1;
    }

    function drawTarget() {
      const t = targetFromPointer();
      if (getBlock(t.x, t.y) !== 'air') {
        ctx.strokeStyle = '#ffe17a';
        ctx.lineWidth = 3;
        ctx.strokeRect(t.x * TILE + 2, t.y * TILE + 2, TILE - 4, TILE - 4);
        if (mineTarget && mineTarget.x === t.x && mineTarget.y === t.y) {
          const p = Math.min(1, mineProgress / BLOCKS[getBlock(t.x, t.y)].hardness);
          ctx.fillStyle = 'rgba(255,225,122,0.32)';
          ctx.fillRect(t.x * TILE + 4, t.y * TILE + TILE - 8, (TILE - 8) * p, 4);
        }
      }
    }

    function shade(color, y, day, type) {
      if (type === 'water') return color;
      const depth = Math.max(0, y - 30) * 0.012;
      const night = (1 - day) * 0.28;
      return mixCssColor(color, '#050713', Math.min(0.58, depth + night));
    }

    function lerpColor(a, b, t) {
      return a.map((v, i) => Math.round(v + (b[i] - v) * t));
    }

    function mixCssColor(hex, target, amount) {
      const a = hexToRgb(hex);
      const b = hexToRgb(target);
      const mixed = lerpColor(a, b, amount);
      return `rgb(${mixed.join(',')})`;
    }

    function hexToRgb(hex) {
      if (hex.startsWith('rgba')) return [64, 145, 214];
      const h = hex.replace('#', '');
      return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
    }

    function updateHud() {
      document.querySelector('#health .fill').style.width = player.health + '%';
      document.querySelector('#hunger .fill').style.width = player.hunger + '%';
      document.querySelector('#stamina .fill').style.width = player.stamina + '%';
      document.querySelector('#health b').textContent = Math.round(player.health);
      document.querySelector('#hunger b').textContent = Math.round(player.hunger);
      document.querySelector('#stamina b').textContent = Math.round(player.stamina);
      const hour = Math.floor(time * 24);
      const px = Math.floor(player.x / TILE), py = Math.floor(player.y / TILE);
      let info = `坐标 ${px}, ${py} · ${String(hour).padStart(2, '0')}:00`;
      if (boss) info += ' 💀BOSS';
      if (bees.length > 0) info += ` 🐝×${bees.length}`;
      if (mobs.length > 0) info += ` 🧟×${mobs.length}`;
      document.getElementById('worldInfo').textContent = info;
      renderInventory();
      if (messageTimer > 0) {
        messageTimer -= 1 / 60;
        if (messageTimer <= 0) document.getElementById('message').classList.remove('show');
      }
    }

    function renderInventory() {
      const el = document.getElementById('inventory');
      el.innerHTML = HOTBAR.map((type, i) => `
        <div class="slot ${i === selected ? 'active' : ''}" data-slot="${i}">
          <span class="key">${i + 1}</span><span>${BLOCKS[type].emoji || '■'}</span><span class="count">${inventory[type] || 0}</span>
        </div>`).join('');
      for (const slot of el.querySelectorAll('.slot')) {
        slot.addEventListener('pointerdown', () => selected = Number(slot.dataset.slot));
      }
    }

    function showMessage(text) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.classList.add('show');
      messageTimer = 2.1;
    }

    function doShoot() {
      if (shootCooldown > 0) return;
      const hasPick = inventory.wood_pickaxe > 0;
      const dmg = hasPick ? 10 : 5;
      const speed = hasPick ? 450 : 300;
      const cx = player.x + player.w / 2;
      const cy = player.y + player.h / 2;
      const targetX = mouse.x + camera.x;
      const targetY = mouse.y + camera.y;
      const mx = targetX - cx;
      const my = targetY - cy;
      const len = Math.max(1, Math.hypot(mx, my));
      shootCooldown = hasPick ? 0.3 : 0.5;
      playerBullets.push({ x: cx, y: cy, vx: mx / len * speed, vy: my / len * speed, dmg, life: 1.2, color: hasPick ? '#f0d060' : '#aaa' });
    }
    function resize() {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }

    let autoSaveTimer = 0;
    function loop(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
      autoSaveTimer += dt;
      if (autoSaveTimer >= 30) {
        autoSaveTimer = 0;
        saveState();
      }
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('keydown', e => {
      keys.add(e.code);
      // 数字键选择快捷栏（0=第10格）
      if (e.code === 'Digit1') selected = 0;
      else if (e.code === 'Digit2') selected = 1;
      else if (e.code === 'Digit3') selected = 2;
      else if (e.code === 'Digit4') selected = 3;
      else if (e.code === 'Digit5') selected = 4;
      else if (e.code === 'Digit6') selected = 5;
      else if (e.code === 'Digit7') selected = 6;
      else if (e.code === 'Digit8') selected = 7;
      else if (e.code === 'Digit9') selected = 8;
      else if (e.code === 'Digit0') selected = 9;
      else if (e.key >= '0' && e.key <= '9') selected = Number(e.key) % 10;
      // 扩展快捷键：- = [ ] 选取10-13格
      else if (e.code === 'Minus') selected = 10;
      else if (e.code === 'BracketLeft') selected = 11;
      else if (e.code === 'BracketRight') selected = 12;
      // 合成快捷键
      if (e.code === 'KeyQ') { craftWorkbench(); renderInventory(); }
      if (e.code === 'KeyE') {
        if (getNearbyWorkbench()) craftAtWorkbench();
        else craftPlanks();
        renderInventory();
      }
      if (e.code === 'KeyT') { craftAtWorkbench(); renderInventory(); }
      if (e.code === 'KeyY') { selected = HOTBAR.indexOf('workbench'); renderInventory(); }
      if (e.code === 'KeyF') { doShoot(); renderInventory(); }
      if (e.code === 'KeyH') { eatApple(); renderInventory(); }
      if (e.code === 'KeyR') resetPlayer(true);
      if (e.code === 'KeyP') { saveGame(); renderInventory(); }
      if (e.code === 'KeyL') { loadGame(); renderInventory(); }
    });
    window.addEventListener('keyup', e => keys.delete(e.code));
    canvas.addEventListener('pointermove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    canvas.addEventListener('pointerdown', e => {
      mouse.x = e.clientX; mouse.y = e.clientY;
      if (e.button === 2) {
        const cx = mouse.x + camera.x;
        const cy = mouse.y + camera.y;
        let hit = false;
        // 优先攻击Boss
        if (boss && cx >= boss.x && cx <= boss.x + boss.w && cy >= boss.y && cy <= boss.y + boss.h && boss.invincible <= 0) {
          const dmg = inventory.wood_pickaxe > 0 ? 18 : 9;
          boss.hp -= dmg;
          boss.invincible = 0.3;
          showMessage('🔥 攻击BOSS！-' + dmg + ' HP:' + boss.hp + '/300');
          hit = true;
        }
        // 攻击普通怪物
        if (!hit) {
          for (let i = mobs.length - 1; i >= 0; i--) {
            const m = mobs[i];
            if (cx >= m.x && cx <= m.x + m.w && cy >= m.y && cy <= m.y + m.h) {
              const dmg = inventory.wood_pickaxe > 0 ? 12 : 6;
              m.hp -= dmg;
              showMessage('⚔️ 攻击！-' + dmg);
              if (m.hp <= 0) {
                mobs.splice(i, 1);
                showMessage('☠️ 击杀怪物！');
              }
              hit = true;
              break;
            }
          }
        }
        // 攻击大黄蜂
        if (!hit) {
          for (let i = bees.length - 1; i >= 0; i--) {
            const b = bees[i];
            if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
              const dmg = inventory.wood_pickaxe > 0 ? 5 : 2;
              b.hp -= dmg;
              showMessage('🐝 拍打大黄蜂！');
              hit = true;
              break;
            }
          }
        }
        if (!hit) placeBlock(targetFromPointer().x, targetFromPointer().y);
      } else {
        mouse.down = true;
      }
    });
    window.addEventListener('pointerup', () => { mouse.down = false; mineProgress = 0; mineTarget = null; });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    // 页面关闭/刷新时自动保存
    window.addEventListener('beforeunload', () => {
      saveState();
    });

    // 可见性变化时保存（切换标签页时）
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        saveState();
      }
    });

    for (const button of document.querySelectorAll('[data-key]')) {
      button.addEventListener('pointerdown', e => { e.preventDefault(); keys.add(button.dataset.key); });
      button.addEventListener('pointerup', e => { e.preventDefault(); keys.delete(button.dataset.key); });
      button.addEventListener('pointerleave', () => keys.delete(button.dataset.key));
    }
    document.getElementById('touchMine').addEventListener('pointerdown', e => { e.preventDefault(); mouse.x = innerWidth / 2; mouse.y = innerHeight / 2; mouse.down = true; });
    document.getElementById('touchMine').addEventListener('pointerup', () => { mouse.down = false; mineProgress = 0; mineTarget = null; });
    document.getElementById('touchPlace').addEventListener('pointerdown', e => { e.preventDefault(); mouse.x = innerWidth / 2; mouse.y = innerHeight / 2; const t = targetFromPointer(); placeBlock(t.x, t.y); });

    resize();
    const savedData = localStorage.getItem(SAVE_KEY);
    if (savedData) {
      try {
        const data = JSON.parse(savedData);
        loadState(data);
        camera.x = player.x - innerWidth / 2;
        camera.y = player.y - innerHeight / 2;
        showMessage('存档已读取。');
      } catch (e) {
        generateWorld(true);
      }
    } else {
      generateWorld(true);
    }
    renderInventory();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
